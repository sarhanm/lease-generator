<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lease Agreement Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-mid: #444;
    --ink-light: #777;
    --paper: #faf9f7;
    --paper-mid: #f0ede8;
    --paper-dark: #e5e0d8;
    --accent: #8b3a2a;
    --accent-light: #f5ebe8;
    --border: #d4cfc7;
    --panel-bg: #f7f5f2;
    --preview-bg: #fff;
    --highlight: #fffbe6;
    --sidebar-w: 380px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--ink);
    color: #fff;
    flex-shrink: 0;
    border-bottom: 2px solid var(--accent);
  }
  .topbar-title {
    font-family: 'Crimson Pro', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .topbar-title span { color: #c97b68; }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #723020; }
  .btn-ghost {
    background: transparent;
    color: #ccc;
    border: 1px solid #555;
  }
  .btn-ghost:hover { border-color: #999; color: #fff; }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── FORM PANEL ── */
  .form-panel {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .form-scroll {
    overflow-y: auto;
    flex: 1;
    padding: 20px 20px 40px;
  }
  .form-scroll::-webkit-scrollbar { width: 5px; }
  .form-scroll::-webkit-scrollbar-thumb { background: var(--paper-dark); border-radius: 3px; }

  .form-group {
    margin-bottom: 24px;
  }
  .form-group-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 6px 0 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--ink-mid);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  input, select, textarea {
    width: 100%;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    color: var(--ink);
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--highlight);
  }
  textarea { resize: vertical; min-height: 60px; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field-row label, .field-row input, .field-row select { margin-bottom: 0; }
  .field-row > div { margin-bottom: 10px; }

  /* tenant cards */
  .tenant-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
  }
  .tenant-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .tenant-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .btn-remove {
    background: none;
    border: none;
    color: var(--ink-light);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0 4px;
    transition: color 0.15s;
  }
  .btn-remove:hover { color: var(--accent); }

  .btn-add {
    width: 100%;
    padding: 8px;
    background: var(--accent-light);
    border: 1px dashed #c97b68;
    border-radius: 4px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    font-family: 'Instrument Sans', sans-serif;
    letter-spacing: 0.03em;
  }
  .btn-add:hover { background: #eeddd9; }

  /* pet / vehicle cards */
  .item-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .item-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .item-label {
    font-size: 11px;
    color: var(--ink-light);
    font-weight: 500;
  }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--paper-mid);
  }

  .preview-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    background: var(--paper-dark);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .preview-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    flex: 1;
  }
  .incomplete-count {
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }

  .preview-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
  }
  .preview-scroll::-webkit-scrollbar { width: 6px; }
  .preview-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .preview-doc {
    max-width: 760px;
    margin: 0 auto;
    background: var(--preview-bg);
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    padding: 64px 72px;
    font-family: 'Crimson Pro', serif;
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--ink);
    min-height: 1100px;
  }

  .preview-doc h1 {
    font-size: 26px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    color: var(--ink);
  }
  .preview-doc h2 {
    font-size: 13px;
    font-weight: 400;
    text-align: center;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 24px;
  }
  .doc-meta {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    margin-bottom: 28px;
    font-size: 13px;
    line-height: 1.9;
  }
  .doc-meta strong { color: var(--ink-mid); font-weight: 500; }

  .preview-doc hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .preview-doc h3 {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 28px 0 6px;
    padding-top: 4px;
    border-top: 2px solid var(--accent-light);
  }
  .preview-doc h4 {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-mid);
    margin: 16px 0 4px;
  }
  .preview-doc p {
    margin-bottom: 10px;
    text-align: justify;
  }
  .preview-doc ol, .preview-doc ul {
    margin: 8px 0 10px 22px;
  }
  .preview-doc li { margin-bottom: 4px; }
  .preview-doc blockquote {
    border-left: 3px solid var(--accent);
    padding: 6px 0 6px 16px;
    color: var(--ink-mid);
    margin: 10px 0;
    font-style: italic;
  }

  table.preview-table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0 14px;
    font-size: 13.5px;
  }
  table.preview-table th {
    background: var(--panel-bg);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-mid);
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
  }
  table.preview-table td {
    padding: 7px 12px;
    border: 1px solid var(--border);
    vertical-align: top;
  }
  table.preview-table tr:nth-child(even) td { background: var(--paper); }

  .placeholder {
    background: #fff3cd;
    color: #856404;
    border-radius: 2px;
    padding: 0 3px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  .filled {
    color: var(--accent);
    font-weight: 500;
  }

  .sig-block {
    margin: 16px 0;
    padding: 14px 0;
    border-top: 1px solid var(--border);
  }
  .sig-line {
    display: flex;
    gap: 24px;
    margin-bottom: 10px;
    align-items: flex-end;
  }
  .sig-field {
    flex: 2;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
    min-height: 28px;
    font-size: 13px;
    color: var(--ink-mid);
  }
  .sig-date {
    flex: 1;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
    min-height: 28px;
  }
  .sig-caption {
    font-size: 11px;
    color: var(--ink-light);
    font-family: 'Instrument Sans', sans-serif;
    margin-top: 3px;
  }

  .initials-block {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin: 16px 0;
  }
  .initials-line {
    border-bottom: 1px solid var(--ink);
    width: 80px;
    height: 24px;
  }
  .initials-caption {
    font-size: 12px;
    color: var(--ink-mid);
    font-family: 'Instrument Sans', sans-serif;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Lease <span>Generator</span></div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="clearForm()">Clear Form</button>
    <button class="btn btn-primary" onclick="generatePDF()">⬇ Download PDF</button>
  </div>
</div>

<div class="main">

  <!-- ══ FORM PANEL ══ -->
  <div class="form-panel">
    <div class="form-scroll">

      <!-- PROPERTY & OWNER -->
      <div class="form-group">
        <div class="form-group-title">Property &amp; Owner</div>
        <label>Owner Name</label>
        <input type="text" id="ownerName" value="Mohammad Sarhan" oninput="update()">
        <label>Property Address Line 1</label>
        <input type="text" id="addr1" value="10827 110th Ave NE" oninput="update()">
        <label>Property Address Line 2</label>
        <input type="text" id="addr2" value="Kirkland, WA 98033" oninput="update()">
        <label>Agreement Date</label>
        <input type="date" id="agreementDate" oninput="update()">
      </div>

      <!-- LEASE TERM -->
      <div class="form-group">
        <div class="form-group-title">Lease Term</div>
        <div class="field-row">
          <div>
            <label>Start Date</label>
            <input type="date" id="leaseStart" oninput="calcTerm()">
          </div>
          <div>
            <label>End Date</label>
            <input type="date" id="leaseEnd" oninput="calcTerm()">
          </div>
        </div>
        <label>Term (months — auto-calculated)</label>
        <input type="text" id="leaseTerm" placeholder="e.g. 12" oninput="update()" readonly style="background:#f5f5f5;color:#888;">
      </div>

      <!-- FINANCIALS -->
      <div class="form-group">
        <div class="form-group-title">Financials</div>
        <div class="field-row">
          <div>
            <label>Monthly Rent</label>
            <input type="text" id="monthlyRent" placeholder="$0.00" oninput="calcTotal()">
          </div>
          <div>
            <label>Security Deposit</label>
            <input type="text" id="secDeposit" placeholder="$0.00" oninput="update()">
          </div>
        </div>
        <div class="field-row">
          <div>
            <label>Pet Deposit</label>
            <input type="text" id="petDeposit" placeholder="$0.00" oninput="update()">
          </div>
          <div>
            <label>Pet Rent / mo</label>
            <input type="text" id="petRent" placeholder="$0.00" oninput="calcTotal()">
          </div>
        </div>
        <label>Total Monthly (auto-calculated)</label>
        <input type="text" id="totalMonthly" readonly style="background:#f5f5f5;color:#888;" placeholder="$0.00">
        <label>Application Fee (per applicant)</label>
        <input type="text" id="appFee" placeholder="$49.00" oninput="update()">
        <div class="field-row">
          <div>
            <label>Rent Increase Date</label>
            <input type="date" id="rentIncDate" oninput="update()">
          </div>
          <div>
            <label>Rent Increase Amount</label>
            <input type="text" id="rentIncAmt" placeholder="$100" oninput="update()">
          </div>
        </div>
      </div>

      <!-- TENANTS -->
      <div class="form-group">
        <div class="form-group-title">Tenants / Occupants</div>
        <div id="tenantList"></div>
        <button class="btn-add" onclick="addTenant()">+ Add Tenant / Occupant</button>
      </div>

      <!-- PETS -->
      <div class="form-group">
        <div class="form-group-title">Pets</div>
        <div id="petList"></div>
        <button class="btn-add" onclick="addPet()">+ Add Pet</button>
      </div>

      <!-- VEHICLES -->
      <div class="form-group">
        <div class="form-group-title">Authorized Vehicles</div>
        <div id="vehicleList"></div>
        <button class="btn-add" onclick="addVehicle()">+ Add Vehicle</button>
      </div>

    </div>
  </div>

  <!-- ══ PREVIEW PANEL ══ -->
  <div class="preview-panel">
    <div class="preview-toolbar">
      <span class="preview-label">Live Preview</span>
      <span class="incomplete-count" id="incompleteCount"></span>
    </div>
    <div class="preview-scroll">
      <div class="preview-doc" id="previewDoc"></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let tenants = [
  { name: '', role: 'Financially Responsible', phone: '', email: '' }
];
let pets = [];
let vehicles = [];

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
window.onload = () => {
  renderTenantCards();
  renderPetCards();
  renderVehicleCards();
  update();
};

// ═══════════════════════════════════════════════
// TENANT MANAGEMENT
// ═══════════════════════════════════════════════
function addTenant() {
  tenants.push({ name: '', role: 'Other Occupant', phone: '', email: '' });
  renderTenantCards();
  update();
}
function removeTenant(i) {
  if (tenants.length === 1) return;
  tenants.splice(i, 1);
  renderTenantCards();
  update();
}
function renderTenantCards() {
  const el = document.getElementById('tenantList');
  el.innerHTML = tenants.map((t, i) => `
    <div class="tenant-card">
      <div class="tenant-card-header">
        <span class="tenant-num">Tenant ${i + 1}</span>
        ${tenants.length > 1 ? `<button class="btn-remove" onclick="removeTenant(${i})">×</button>` : ''}
      </div>
      <label>Full Name</label>
      <input type="text" value="${esc(t.name)}" placeholder="Full legal name"
        oninput="tenants[${i}].name=this.value;update()">
      <label>Role</label>
      <select onchange="tenants[${i}].role=this.value;update()">
        <option ${t.role==='Financially Responsible'?'selected':''}>Financially Responsible</option>
        <option ${t.role==='Other Occupant'?'selected':''}>Other Occupant</option>
      </select>
      <label>Phone</label>
      <input type="tel" value="${esc(t.phone)}" placeholder="(555) 555-5555"
        oninput="tenants[${i}].phone=this.value;update()">
      <label>Email</label>
      <input type="email" value="${esc(t.email)}" placeholder="email@example.com"
        oninput="tenants[${i}].email=this.value;update()">
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// PET MANAGEMENT
// ═══════════════════════════════════════════════
function addPet() {
  pets.push({ name: '', breed: '', weight: '', age: '' });
  renderPetCards();
  update();
}
function removePet(i) {
  pets.splice(i, 1);
  renderPetCards();
  update();
}
function renderPetCards() {
  const el = document.getElementById('petList');
  if (pets.length === 0) {
    el.innerHTML = '<p style="font-size:12px;color:#999;margin-bottom:8px;">No pets added.</p>';
    return;
  }
  el.innerHTML = pets.map((p, i) => `
    <div class="item-card">
      <div class="item-card-header">
        <span class="item-label">Pet ${i + 1}</span>
        <button class="btn-remove" onclick="removePet(${i})">×</button>
      </div>
      <div class="field-row">
        <div><label>Name</label><input type="text" value="${esc(p.name)}" placeholder="Buddy"
          oninput="pets[${i}].name=this.value;update()"></div>
        <div><label>Breed / Type</label><input type="text" value="${esc(p.breed)}" placeholder="Lab Mix"
          oninput="pets[${i}].breed=this.value;update()"></div>
      </div>
      <div class="field-row">
        <div><label>Weight (lbs)</label><input type="text" value="${esc(p.weight)}" placeholder="45"
          oninput="pets[${i}].weight=this.value;update()"></div>
        <div><label>Age (years)</label><input type="text" value="${esc(p.age)}" placeholder="3"
          oninput="pets[${i}].age=this.value;update()"></div>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// VEHICLE MANAGEMENT
// ═══════════════════════════════════════════════
function addVehicle() {
  vehicles.push({ make: '', model: '', color: '', plate: '', year: '' });
  renderVehicleCards();
  update();
}
function removeVehicle(i) {
  vehicles.splice(i, 1);
  renderVehicleCards();
  update();
}
function renderVehicleCards() {
  const el = document.getElementById('vehicleList');
  if (vehicles.length === 0) {
    el.innerHTML = '<p style="font-size:12px;color:#999;margin-bottom:8px;">No vehicles added.</p>';
    return;
  }
  el.innerHTML = vehicles.map((v, i) => `
    <div class="item-card">
      <div class="item-card-header">
        <span class="item-label">Vehicle ${i + 1}</span>
        <button class="btn-remove" onclick="removeVehicle(${i})">×</button>
      </div>
      <div class="field-row">
        <div><label>Year</label><input type="text" value="${esc(v.year)}" placeholder="2022"
          oninput="vehicles[${i}].year=this.value;update()"></div>
        <div><label>Make</label><input type="text" value="${esc(v.make)}" placeholder="Toyota"
          oninput="vehicles[${i}].make=this.value;update()"></div>
      </div>
      <div class="field-row">
        <div><label>Model</label><input type="text" value="${esc(v.model)}" placeholder="Camry"
          oninput="vehicles[${i}].model=this.value;update()"></div>
        <div><label>Color</label><input type="text" value="${esc(v.color)}" placeholder="Silver"
          oninput="vehicles[${i}].color=this.value;update()"></div>
      </div>
      <label>License Plate</label>
      <input type="text" value="${esc(v.plate)}" placeholder="ABC 1234"
        oninput="vehicles[${i}].plate=this.value;update()">
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// AUTO-CALCULATIONS
// ═══════════════════════════════════════════════
function calcTerm() {
  const s = document.getElementById('leaseStart').value;
  const e = document.getElementById('leaseEnd').value;
  if (s && e) {
    const [sy, sm, sd] = s.split('-').map(Number);
    const [ey, em, ed] = e.split('-').map(Number);
    // Count full months: e.g. Dec 1 → Nov 30 the following year = 12 months
    // We add 1 day to end date to make inclusive-end ranges work correctly
    const endAdj = new Date(ey, em - 1, ed + 1);
    const months = (endAdj.getFullYear() - sy) * 12 + (endAdj.getMonth() - (sm - 1));
    document.getElementById('leaseTerm').value = months > 0 ? months : '';
  }
  update();
}

function calcTotal() {
  const rent = parseDollar(document.getElementById('monthlyRent').value);
  const pet  = parseDollar(document.getElementById('petRent').value);
  const total = rent + pet;
  document.getElementById('totalMonthly').value = total > 0 ? fmt(total) : '';
  update();
}

function parseDollar(s) {
  return parseFloat((s || '').replace(/[$,]/g, '')) || 0;
}
function fmt(n) {
  return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function esc(s) { return (s||'').replace(/"/g,'&quot;'); }
function fmtDate(d) {
  if (!d) return null;
  const [y,m,day] = d.split('-');
  return `${m}/${day}/${y}`;
}

function val(id) { return document.getElementById(id).value.trim(); }

function ph(v, label) {
  if (v) return `<span class="filled">${v}</span>`;
  return `<span class="placeholder">{{${label}}}</span>`;
}

function getTenantNames() {
  const names = tenants.map(t => t.name).filter(Boolean);
  return names.length ? names.join(', ') : null;
}

function getOccupantList() {
  if (!tenants.some(t => t.name)) return null;
  return tenants.filter(t => t.name).map(t => {
    let line = `<strong>${t.name}</strong> — ${t.role}`;
    if (t.phone) line += `<br><small style="color:#777;">${t.phone}</small>`;
    if (t.email) line += `<small style="color:#777;"> · ${t.email}</small>`;
    return `<div style="margin:6px 0 6px 12px;">${line}</div>`;
  }).join('');
}

function getPetList() {
  if (pets.length === 0) return null;
  return pets.map(p => {
    const parts = [p.name, p.breed, p.weight ? p.weight + ' lbs' : '', p.age ? p.age + ' yrs' : ''].filter(Boolean);
    return parts.join(', ');
  }).join('<br>');
}

function getVehicleList() {
  if (vehicles.length === 0) return null;
  return vehicles.map(v => {
    const parts = [v.year, v.make, v.model, v.color, v.plate ? 'Lic# ' + v.plate : ''].filter(Boolean);
    return parts.join(' ');
  }).join('<br>');
}

function getSignatureBlocks() {
  const resp = tenants.filter(t => t.role === 'Financially Responsible' && t.name);
  if (!resp.length) return `<span class="placeholder">{{SIGNATURE_BLOCKS}}</span>`;
  return resp.map(t => `
    <div class="sig-block">
      <div class="sig-line">
        <div>
          <div class="sig-field"></div>
          <div class="sig-caption">Resident Signature — ${t.name}</div>
        </div>
        <div>
          <div class="sig-date"></div>
          <div class="sig-caption">Date</div>
        </div>
      </div>
      <div style="font-size:12px;color:#777;font-family:'Instrument Sans',sans-serif;margin-top:2px;">
        ${t.email ? t.email + ' · ' : ''}${t.phone || ''}
      </div>
    </div>
  `).join('');
}

function initialsBlock() {
  const resp = tenants.filter(t => t.role === 'Financially Responsible' && t.name);
  if (!resp.length) {
    return `<div class="initials-block"><div class="initials-line"></div><div class="initials-caption">Resident Initials &nbsp;&nbsp;&nbsp; Date: __________</div></div>`;
  }
  return resp.map(t => `
    <div class="initials-block">
      <div class="initials-line"></div>
      <div class="initials-caption">${t.name} — Initials &nbsp;&nbsp;&nbsp; Date: __________</div>
    </div>
  `).join('');
}

function countIncomplete() {
  const fields = [
    val('ownerName'), val('addr1'), val('addr2'), val('agreementDate'),
    val('leaseStart'), val('leaseEnd'), val('monthlyRent'), val('secDeposit'), val('appFee')
  ];
  const tenantMissing = tenants.filter(t => !t.name).length;
  const missing = fields.filter(f => !f).length + tenantMissing;
  return missing;
}

    <p><strong>Notice Fees:</strong> If for the reason of non-payment of rent, Owner shall give a statutory Notice to Pay or Vacate pursuant to RCW 59.12 et seq. or RCW 59.18 et seq., Resident agrees to pay the sum of <strong>$250.00</strong> for preparing and giving the notice.</p>
    <p><strong>Non-Payment of First Rent Payment:</strong> If Resident has not paid all amounts then due by the lease starting date: (i) Resident has no right to possession or keys to the Premises and; (ii) this Lease is voidable at the option of Owner 2 calendar days after giving Resident a notice to pay.</p>

    <h4>1.4 Deposit</h4>

    <p><strong>Utilities included in Rent:</strong> None.</p>
    <p>Non-payment of utility charges may lead to an eviction proceeding. The Owner is entitled to use the Resident's security deposit to recover unpaid utility charges upon move-out. Utilities are considered as "Rent."</p>

    <h4>1.10 Vehicles</h4>
    <p>Resident is authorized to park the following vehicle(s) on the property. Unauthorized vehicles may be removed or towed at the vehicle owner's expense:</p>

    <p>Recreation vehicles, trailers, boats, and inoperable or unlicensed automobiles may not be parked or stored on the Property. No repair to any vehicles may be carried out on the property. All costs incurred for vehicle removal shall be payable by the Resident in addition to an administration fee of <strong>$100.00</strong>.</p>

    <h4>1.11 Inspection / Re-Lease / Sale</h4>
    <p>Owner may enter the Property to inspect it or make alterations or repairs at reasonable times and, except in emergencies, will give <strong>two (2) days' notice</strong> to the Resident. If Owner wishes to show the Property to prospective purchasers or Residents, <strong>one (1) day's notice</strong> of intent to enter shall be required. If access is denied after proper notice, the Resident will be fined <strong>$100.00</strong> for each violation per RCW 59.18.150. The Resident agrees to pay a fee of <strong>$50.00</strong> or vendor's charge (whichever is higher) for missing any scheduled appointment at the Property.</p>

    <h4>1.14 Lockout Clause / Keys; Locks</h4>
    <p>The Resident will be responsible for any costs associated with lost or stolen keys or access cards and remotes. The Resident may not re-key or remove any locks. If the Resident is locked out of the Premises, the Resident must contact a locksmith and pay for any charges. Owner does not provide locksmith services.</p>

    <h4>1.15 Asbestos</h4>
    <p>The Premises may contain asbestos and/or other substances known to cause cancer and/or birth defects and other reproductive harm. Resident, Occupants, and their guests must not take or permit any action which in any way damages or disturbs the ceiling in the Premises or any part thereof, including without limitation: (a) piercing the surface of the ceiling; (b) hanging plants, mobiles, or other objects from the ceiling; (c) attaching any fixtures to the ceiling; (d) allowing any objects to come into contact with the ceiling; (e) permitting water or any liquid to come into contact with the ceiling; (f) painting, cleaning or undertaking any repairs of any portion of the ceiling; (g) replacing light fixtures; (h) undertaking any activity which results in building vibration which may cause damage to the ceiling; or (i) altering or disturbing the heating and ventilation system serving the Premises.</p>

    <h4>1.16 Fire and Safety</h4>
    <p>The Resident agrees to prevent the risk of fire and fire-related injuries. This includes: (a) No combustible fluids, fireworks, or other hazardous materials; (b) Maintain smoke and CO detectors, replacing batteries every six (6) months; (c) Report detector problems to the Owner immediately; (d) Use UL-labeled electrical appliances; (e) Unplug small appliances when not in use; (f) Do not use items with cracked or frayed cords; (g) Use surge-protected power adaptors; (h) Keep baseboard heaters clear by twelve (12) inches; (i) Place portable heaters at least three (3) feet from flammable materials; (j) Never leave cooking unattended; (k) Develop household emergency escape plans; (l) Ensure all household members can dial 911.</p>

    <h4>1.17 Smoke Detection Devices / Fire Safety</h4>
    <p>All rooms, hallways, and living spaces are equipped with smoke detection devices as required by law. It is the responsibility of Resident to maintain all smoke detection devices, including replacement of any batteries. Resident shall not tamper with or disable any smoke detection devices. Failure to comply may result in a fine of up to <strong>$200.00</strong> in accordance with RCW 43.44.110 / WAC 212.10.050. Resident agrees to test the smoke detector monthly and report any malfunctions to the Owner in writing.</p>

    <h4>1.18 Carbon Monoxide Detection Devices</h4>
    <p>In accordance with RCW 19.27.530, a minimum of one carbon monoxide detector is provided. The Resident shall not tamper with, remove batteries, or otherwise disable or relocate any carbon monoxide detection devices. The Resident also agrees to test the carbon monoxide detector monthly and report any malfunctions to the Owner in writing.</p>

    <h4>1.19 Use / Assignments or Sub-Letting</h4>
    <p>Resident shall not use the Premises for any business purpose, including but not limited to garage/yard sales, private lessons/tutoring, AirBnB, and VRBO. Resident shall not assign this Agreement, sub-let the Premises, or permit the Premises to be used for any purpose other than as the primary full-time residence for the following named persons:</p>
    <div style="margin:8px 0 8px 16px;">
      ${occupantList || `<span class="placeholder">{{TENANT_OCCUPANT_LIST}}</span>`}
    </div>
    <p>Changes in occupancy are not permitted without the prior written approval of the Owner. A non-refundable administrative fee of <strong>$250.00</strong> shall be charged for any request to add or remove a Resident from the lease agreement.</p>

    <h4>1.20 Delivery of Premises</h4>
    <p>If for any reason whatsoever Owner does not deliver possession of the Premises on the commencement of the term of this Agreement, rent shall be prorated until such time as Owner tenders possession. If possession of the Premises is not tendered within 5 days of the commencement of the term, Resident may terminate this Agreement by giving written notice to Owner, and any monies paid by Resident to Owner shall be refunded.</p>

    <h4>1.21 Freezing</h4>
    <p>The Resident shall leave the heat on low during cold weather and shall turn off the water to outside faucets wherever possible. The Resident shall install faucet covers on all outside faucets during cold weather.</p>

    <h4>1.22 Ventilation</h4>
    <p>Resident shall adequately ventilate the Property to prevent high humidity, which can result in condensation, mold, and mildew growth. The Resident is responsible to clean mold or mildew and/or pay for any damage resulting from inadequate ventilation.</p>

    <h4>1.23 Garbage</h4>
    <p>Resident shall contract for refuse collection services, furnish their own garbage can, and place it where required for pickup. Resident shall properly dispose of all rubbish and garbage in a clean and sanitary manner at reasonable and regular intervals and assume all costs for extermination caused by Resident's neglect.</p>

    <h4>1.24 Nails / Painting</h4>
    <p>Resident shall not drive any nails or screws into walls, and shall not paint any part of the Property, without the prior written consent of the Owner. Any holes must be filled using spackle, followed by full wall painting by a professional painting company to ensure a proper match.</p>

    <h4>1.25 Pets and Animals</h4>
    <p>Unless otherwise provided under federal, state, or local law, no animals (including mammals, reptiles, birds, fish, rodents, and insects) are allowed, even temporarily, anywhere on the premises unless we've so authorized in writing. You must remove an illegal or unauthorized animal within 24 hours of notice from us, or you will be considered in default of this Lease Agreement. If we allow an animal as a pet, you must execute a separate animal addendum which may require additional deposits, rents, fees or other charges. An animal deposit is considered a general security deposit.</p>
    <p>We will authorize an assistance animal for a disabled person. When allowed by applicable laws, before we authorize an assistance animal, if the disability is not readily apparent, we may require a written statement from a qualified professional verifying the disability-related need for the assistance animal. Animal deposits, additional rents, fees or other charges will not be required for an assistance animal needed due to disability, including an emotional support or service animal, as authorized under federal, state, or local law.</p>
    <p>You must not feed stray or wild animals. No pets will be allowed to visit the property and no "pet-sitting" shall be allowed. If a pet becomes a problem in our sole opinion, we reserve the right to require that the pet be removed from the property. Once a pet has been removed from the property, the pet deposit for that pet shall not be returned during the tenancy even though the animal is no longer on the property. If you have pets, assistance or service animals, they must be secured during maintenance work. If they are not secured and pose any type of danger to Maintenance, in our sole opinion, Maintenance shall be entitled to leave the unit prior to the completion of the work and it shall be your sole responsibility to schedule a return by Maintenance for the completion of the work after the animal has been secured.</p>
    <p>If you or any guest or occupant violates animal restrictions (with or without your knowledge), you'll be subject to charges, damages, eviction, and other remedies provided in this Lease Agreement. If an animal has been on the premises at any time during your term of occupancy (with or without our consent), Resident assumes all costs of restoring Premises as a result of any pet or animal on the Premises, including but not limited to costs to de-flea, fumigate, clean or replace floor coverings, yard restoration, and cost to analyze floors for the presence of animal urine/waste or pest infestation should analysis disclose the presence of such damage. These policies include "guest pets." No pets are to be added or substituted without the Owner's written permission. Initial and daily animal-violation charges and animal-removal charges are liquidated damages for our time, inconvenience, and overhead (except for attorney's fees and litigation costs) in enforcing animal restrictions and rules. We may kennel the animal or contact a humane society or local authority for pickup. When kenneling an animal, we won't be liable for loss, harm, sickness, or death of the animal unless due to our negligence. We'll return the animal to you upon request if it has not already been turned over to a humane society or local authority. You must pay for the animal's reasonable care and kenneling charges. We have no lien on the animal for any purpose.</p>

    <h4>1.26 Attorneys' Fees / Venue and Jurisdiction</h4>
    <p>As provided by law and except as otherwise prohibited, the prevailing party shall be entitled to recover its reasonable attorney's fees and court costs. This Agreement shall be governed by and construed in accordance with the laws of the State of Washington. Venue for any legal action shall be in the District or Superior Court with jurisdiction over the area in which the Premises are located.</p>

    <h4>1.27 Non-Waiver of Breach and Severability</h4>
    <p>The failure of Owner to insist upon the strict performance of any term of this Agreement shall not be construed to be a waiver or relinquishment of any such term or Agreement. If any clause or provision of this Agreement is illegal, invalid, or unenforceable under present or future laws effective during the term hereof, the remainder of the Agreement shall not be affected thereby, and the parties intend that a valid and enforceable clause as similar as possible shall be substituted in its place.</p>

    <h4>1.28 Water Heater</h4>
    <p>Pursuant to RCW 19.27A.060, the temperature control in a domestic hot-water heater within a rental dwelling must be set no higher than <strong>120 degrees Fahrenheit</strong>. The Resident acknowledges that the hot-water heater has been inspected and to the best of the Resident's knowledge is not set higher than 120 degrees Fahrenheit.</p>

    <h4>1.29 Lead Warning Statement</h4>
    <p>Housing built before 1978 may contain lead-based paint. Lead-based paint, paint chips, and dust can pose health hazards if not managed properly. Lead exposure is especially harmful to young children and pregnant women.</p>

    <h4>1.30 Rental Premises, Storage, and Parking</h4>
    <p>The Resident recognizes that his/her storage of any personal property or vehicles on the Premises is at his/her own risk. The Owner and agent are not liable for claims for damages arising out of the loss or damage to goods in storage for whatever reason outside of the Owner's control.</p>

    <h4>1.31 Actions by Third Parties / Personal Protection</h4>
    <p>Owner disclaims any warranties or representation that it will be liable to Resident for any damages or losses to person or property caused by other persons. Resident understands that personal safety and security are Resident's own personal responsibility. Harassment or intimidation of a Resident, guest, Owner, or Owner's agent is prohibited. Resident is responsible for all damage caused to the Premises as a result of the negligence of Resident, their guests and invitees, including but not limited to fire and glass breakage.</p>

    <h4>1.32 Attractive Nuisances</h4>
    <p>Residents agree to not use, install, allow, or support any attractive features including but not limited to trampolines, skate ramps, and pools, on the Premises or surrounding property areas due to potential injury.</p>

    <h4>1.33 Renters Insurance — Required</h4>
    <p>Renters liability insurance is required. A minimum of <strong>$100,000</strong> of liability coverage must be obtained. Resident is required to provide proof of current renters insurance policy on the day of move-in, again at lease renewal, and/or when asked by the Owner. All individuals residing in the rental property must be named on the rental insurance policy.</p>

    <h4>1.34 Liens and Sales</h4>
    <p>This Lease is subject and subordinate to any mortgage or deed of trust which is now or hereafter a lien upon the Property or the Premises. Resident shall execute and deliver, within 10 days after demand, whatever instruments may be required from time to time by any mortgagee or deed of trust beneficiary.</p>
    <p><strong>Termination Upon Sale:</strong> Pursuant to RCW 59.18.650(2)(e), Owner may terminate this tenancy if Owner has entered into a bona fide agreement to sell the Premises and the buyer or a member of the buyer's immediate family intends to occupy the Premises as their primary residence. In such event, Owner shall provide Resident with at least <strong>ninety (90) days' written notice</strong> prior to the termination date. Owner shall not be obligated to pay relocation assistance if the Premises is a single-family residence as defined under applicable Washington State law. If the sale does not close within 90 days after the Resident vacates, Owner shall either offer the Resident the opportunity to reinstate the tenancy or pay the Resident the equivalent of one (1) month's rent as compensation, as required by RCW 59.18.650. Resident acknowledges that this clause does not waive any rights afforded to Resident under Washington State law that cannot be waived by contract.</p>

    <h4>1.35 General Terms</h4>
    <p>No oral agreements have been entered into with respect to this Agreement. This Agreement shall not be modified except by an instrument in writing signed by the Resident and Owner. In the event of more than one Resident, each Resident is jointly and severally liable for each provision of this Agreement. Time is of the essence of this Agreement.</p>

    <h4>1.35A Rent Payment — Online Portal</h4>
    <ol>
      <li><strong>Required Payment Method:</strong> All rent and other charges due under this Agreement must be paid through the Owner's designated online rental payment portal. The portal currently in use is <strong>apartments.com</strong>, though Owner reserves the right to designate a different portal upon written notice to Resident.</li>
      <li><strong>Auto-Pay Required:</strong> Resident is required to enroll in automatic payments through the portal. It is Resident's sole responsibility to ensure that the auto-pay amount is correct and current at all times, including in the event of any rent increase.</li>
      <li><strong>Accepted Payment Methods:</strong> eCheck (ACH) is accepted. Personal checks and money orders are not accepted. Debit and credit card payments may be accepted through the portal subject to any fees imposed by the portal provider, which are the sole responsibility of Resident.</li>
      <li><strong>Failed Payments:</strong> Any payment that does not clear for any reason shall be treated as unpaid rent and subject to the returned payment fee described in Section 1.3. Resident's submission of a payment and receipt of a confirmation number does not constitute confirmation that the payment has cleared.</li>
      <li><strong>Cancellation of Auto-Pay:</strong> If Resident sets up automatic payments, those payments will continue until Resident cancels them. Owner cannot reverse, cancel, or modify payments on Resident's behalf. If a payment is made in error, Owner will issue a refund by check to Resident once the payment has fully cleared.</li>

    <p>Molds are microscopic organisms that produce enzymes to digest organic matter and spores to reproduce. Problems arise when mold starts digesting organic materials in our homes. The way to control mold growth is to control moisture.</p>
    <p><strong>To control mold growth:</strong> Fix any moisture problems; stop all water leaks; repair leaking roofs and plumbing; increase air circulation within your home; install and use exhaust fans in bathrooms, kitchens, and laundry rooms; ventilate and insulate the attic and crawlspaces; clean and dry water-damaged materials within 24 to 48 hours; vacuum and clean your home regularly.</p>
    <p><strong>Health Effects:</strong> You may experience a skin rash, running nose, eye irritation, cough, congestion, and aggravation of asthma. If you or your family members have health problems that you suspect are caused by exposure to mold, you should consult with your physician.</p>
    <p><strong>To clean up mold:</strong> Protect yourself with goggles, gloves, and breathing protection. Seal off the area. Scrub all affected hard surfaces with a mild detergent solution, optionally with a bleach solution (¼ cup bleach to one quart of water), and finally apply a borate-based detergent solution and do not rinse.</p>

// PDF GENERATION

function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });

  const margins = { top: 72, left: 72, right: 72, bottom: 72 };
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const contentW = pageW - margins.left - margins.right;

  // fonts
  const FONT_BODY   = 'times';
  const FONT_SANS   = 'helvetica';
  const SIZE_BODY   = 10;
  const SIZE_H1     = 18;
  const SIZE_H2     = 9;
  const SIZE_H3     = 11;
  const SIZE_H4     = 10;
  const SIZE_SMALL  = 8.5;
  const C_INK       = [26, 26, 26];
  const C_ACCENT    = [139, 58, 42];
  const C_MID       = [80, 80, 80];
  const C_LIGHT     = [140, 140, 140];
  const C_RULE      = [220, 215, 207];
  const C_SHADED    = [247, 245, 242];

  let y = margins.top;
  let pageNum = 1;

  function checkPage(needed = 20) {
    if (y + needed > pageH - margins.bottom) {
      doc.addPage();
      pageNum++;
      y = margins.top;
      // page number footer
      doc.setFont(FONT_SANS, 'normal');
      doc.setFontSize(SIZE_SMALL);
      doc.setTextColor(...C_LIGHT);
      doc.text(`Page ${pageNum}`, pageW / 2, pageH - 36, { align: 'center' });
    }
  }

  function rule(color = C_RULE, weight = 0.5) {
    doc.setDrawColor(...color);
    doc.setLineWidth(weight);
    doc.line(margins.left, y, pageW - margins.right, y);
    y += 8;
  }

  function h1(text) {
    checkPage(40);
    doc.setFont(FONT_BODY, 'bold');
    doc.setFontSize(SIZE_H1);
    doc.setTextColor(...C_INK);
    doc.text(text, pageW / 2, y, { align: 'center' });
    y += 6;
  }

  function subtitle(text) {
    checkPage(20);
    doc.setFont(FONT_SANS, 'normal');
    doc.setFontSize(SIZE_H2);
    doc.setTextColor(...C_LIGHT);
    const spaced = text.split('').join(' ');
    doc.text(spaced.toUpperCase(), pageW / 2, y, { align: 'center' });
    y += 20;
  }

  function sectionHead(text) {
    checkPage(30);
    y += 10;
    doc.setFillColor(...C_ACCENT);
    doc.rect(margins.left, y - 12, contentW, 18, 'F');
    doc.setFont(FONT_SANS, 'bold');
    doc.setFontSize(SIZE_H2);
    doc.setTextColor(255, 255, 255);
    doc.text(text.toUpperCase(), margins.left + 8, y);
    y += 10;
  }

  function subHead(text) {
    checkPage(20);
    y += 8;
    doc.setFont(FONT_SANS, 'bold');
    doc.setFontSize(SIZE_H4);
    doc.setTextColor(...C_ACCENT);
    doc.text(text, margins.left, y);
    y += 4;
    doc.setDrawColor(...C_ACCENT);
    doc.setLineWidth(0.3);
    doc.line(margins.left, y, margins.left + doc.getTextWidth(text), y);
    y += 8;
  }

  function para(text, opts = {}) {
    const indent = opts.indent || 0;
    const x = margins.left + indent;
    const w = contentW - indent;
    doc.setFont(FONT_BODY, opts.bold ? 'bold' : 'normal');
    doc.setFontSize(SIZE_BODY);
    doc.setTextColor(...(opts.color || C_INK));
    const lines = doc.splitTextToSize(text, w);
    lines.forEach(line => {
      checkPage(14);
      doc.text(line, x, y);
      y += 14;
    });
    y += opts.after !== undefined ? opts.after : 4;
  }

  function listItem(text, num, opts = {}) {
    const indent = 18;
    const x = margins.left + indent;
    const w = contentW - indent;
    doc.setFont(FONT_BODY, 'normal');
    doc.setFontSize(SIZE_BODY);
    doc.setTextColor(...C_INK);
    const bullet = opts.bullet || `${num}.`;
    doc.text(bullet, margins.left + 4, y);
    const lines = doc.splitTextToSize(text, w);
    lines.forEach((line, li) => {
      checkPage(14);
      doc.text(line, x, y);
      y += 14;
    });
    y += 2;
  }

  function tableRow(cols, widths, isHeader = false, shaded = false) {
    const rowH = 16;
    checkPage(rowH + 4);
    let x = margins.left;
    if (shaded || isHeader) {
      doc.setFillColor(...(isHeader ? C_ACCENT : C_SHADED));
      doc.rect(x, y - 12, contentW, rowH, 'F');
    }
    doc.setDrawColor(...C_RULE);
    doc.setLineWidth(0.3);
    doc.rect(margins.left, y - 12, contentW, rowH);
    cols.forEach((col, i) => {
      doc.setFont(FONT_SANS, isHeader ? 'bold' : 'normal');
      doc.setFontSize(isHeader ? SIZE_SMALL : SIZE_BODY);
      doc.setTextColor(...(isHeader ? [255,255,255] : C_INK));
      doc.text(String(col || ''), x + 6, y - 1);
      x += widths[i];
      if (i < cols.length - 1) {
        doc.setDrawColor(...C_RULE);
        doc.line(x, y - 12, x, y + 4);
      }
    });
    y += rowH - 2;
  }

  function infoTable(rows) {
    rows.forEach((row, i) => tableRow(row, [180, contentW - 180], false, i % 2 === 0));
    y += 6;
  }

  function sigLine(label, name = '') {
    checkPage(40);
    y += 8;
    doc.setDrawColor(...C_INK);
    doc.setLineWidth(0.4);
    doc.line(margins.left, y, margins.left + 300, y);
    doc.line(margins.left + 320, y, margins.left + contentW, y);
    y += 4;
    doc.setFont(FONT_SANS, 'normal');
    doc.setFontSize(SIZE_SMALL);
    doc.setTextColor(...C_LIGHT);
    doc.text(label + (name ? ` — ${name}` : ''), margins.left, y);
    doc.text('Date', margins.left + 320, y);
    y += 14;
  }

  function initialsLine(name = '') {
    checkPage(30);
    y += 6;
    doc.setFillColor(...C_SHADED);
    doc.roundedRect(margins.left, y - 10, contentW, 22, 2, 2, 'F');
    doc.setDrawColor(...C_RULE);
    doc.setLineWidth(0.3);
    doc.roundedRect(margins.left, y - 10, contentW, 22, 2, 2, 'S');
    doc.setDrawColor(...C_INK);
    doc.setLineWidth(0.4);
    doc.line(margins.left + 10, y + 6, margins.left + 90, y + 6);
    doc.setFont(FONT_SANS, 'normal');
    doc.setFontSize(SIZE_SMALL);
    doc.setTextColor(...C_MID);
    doc.text((name ? name + ' — ' : '') + 'Initials', margins.left + 96, y + 7);
    doc.text('Date: _______________', margins.left + 320, y + 7);
    y += 20;
  }

  // get values
  const owner      = val('ownerName') || '{{OWNER_NAME}}';
  const addr1v     = val('addr1') || '{{ADDRESS_1}}';
  const addr2v     = val('addr2') || '{{ADDRESS_2}}';
  const agDate     = fmtDate(val('agreementDate')) || '{{DATE}}';
  const lStart     = fmtDate(val('leaseStart')) || '{{START_DATE}}';
  const lEnd       = fmtDate(val('leaseEnd')) || '{{END_DATE}}';
  const lTerm      = val('leaseTerm') || '{{TERM}}';
  const mRent      = val('monthlyRent') || '{{RENT}}';
  const sDep       = val('secDeposit') || '{{SEC_DEP}}';
  const pDep       = val('petDeposit') || '{{PET_DEP}}';
  const pRent      = val('petRent') || '{{PET_RENT}}';
  const totMo      = val('totalMonthly') || '{{TOTAL}}';
  const aFee       = val('appFee') || '{{APP_FEE}}';
  const rIncDate   = fmtDate(val('rentIncDate')) || '{{INC_DATE}}';
  const rIncAmt    = val('rentIncAmt') || '{{INC_AMT}}';
  const tNames     = getTenantNames() || '{{TENANT_NAMES}}';
  const address    = `${addr1v}, ${addr2v}`;

  // page 1 footer
  doc.setFont(FONT_SANS, 'normal');
  doc.setFontSize(SIZE_SMALL);
  doc.setTextColor(...C_LIGHT);
  doc.text('Page 1', pageW / 2, pageH - 36, { align: 'center' });

  // ── TITLE ──
  h1('RESIDENTIAL LEASE AGREEMENT');
  subtitle('Washington State');

  // meta box
  doc.setFillColor(...C_SHADED);
  doc.roundedRect(margins.left, y, contentW, 68, 3, 3, 'F');
  doc.setDrawColor(...C_RULE);
  doc.setLineWidth(0.4);
  doc.roundedRect(margins.left, y, contentW, 68, 3, 3, 'S');
  y += 14;
  const metaX = margins.left + 12;
  const metaPairs = [
    ['Agreement Date', agDate],
    ['Property', address],
    ['Owner', owner],
    ['Resident(s)', tNames],
  ];
  metaPairs.forEach(([k, v]) => {
    doc.setFont(FONT_SANS, 'bold'); doc.setFontSize(SIZE_SMALL); doc.setTextColor(...C_MID);
    doc.text(k + ':', metaX, y);
    doc.setFont(FONT_BODY, 'normal'); doc.setFontSize(SIZE_BODY); doc.setTextColor(...C_INK);
    doc.text(v, metaX + 100, y);
    y += 15;
  });
  y += 8;

  // ── SECTION 1 ──
  sectionHead('Section 1 — Lease Terms');

  subHead('1.1 Overview');
  para(`This Initial Agreement is made on ${agDate} between Owner ${owner} (hereinafter called "Owner") and ${tNames} (hereinafter called "Resident"), for rental Premises located at: ${address} (hereinafter called the "Premises.")`);

  subHead('1.2 Term');
  para(`The term of this Agreement shall be a Lease for a term of ${lTerm} months beginning ${lStart} and ending ${lEnd}.`);
  para('Upon expiration of this term, all Resident\'s rights to occupy the Premises shall cease without right to extend the term hereof. This Agreement shall not revert to a month-to-month tenancy following expiration of the term.');
  para('Holdover Fee — In the event that the Resident remains in possession of the rental property beyond the initial term of the lease without executing a new lease or obtaining the Owner\'s consent, the Resident shall be held liable for an unauthorized month-to-month fee equivalent to 10% of the monthly rent. This fee is in addition to the rent amount outlined in the lease agreement.');

  subHead('1.3 Rent');
  tableRow(['Description', 'Amount'], [contentW * 0.7, contentW * 0.3], true);
  [['Monthly Rent', mRent], ['Pet Rent', pRent], ['Total Monthly Due', totMo]].forEach(([d,a],i) => tableRow([d,a],[contentW*0.7,contentW*0.3],false,i%2===0));
  y += 6;
  para('Prorated Rent, if any, shall apply to the second month of tenancy and shall be payable on the first day of the second month of tenancy.');
  para('The total amount of monthly rent due is considered "Rent" and is payable in advance by the first day of each and every month to Owner, or any such other place that the Owner may from time to time designate.');
  para('Late Charge: Rent received more than five (5) days after the Rent Due Date shall result in a $50.00 late payment charge plus $20.00 each additional day thereafter that rent has not been paid in full.');
  para('Returned Payment: Any payment which fails to clear the bank shall be treated as unpaid rent and shall be subject to the aforementioned late payment charge, plus a $45.00 returned payment fee.');
  para('Notice Fees: If Owner shall give a statutory Notice to Pay or Vacate pursuant to RCW 59.12 et seq. or RCW 59.18 et seq., Resident agrees to pay $250.00 for preparing and giving the notice.');

  subHead('1.4 Deposit');
  para(`The Resident shall pay a Security Deposit in the total amount of ${sDep}, which has been paid in full. The deposit is for all purposes, including unpaid rent, damage, cleaning, late payment, utilities, keys, and other charges. The Resident's liability is not limited by the amount of the deposit.`);
  para('Labor and administrative costs for cleaning and repairing the Premises shall be at the rate of $65.00 per hour. Resident agrees to hire professional cleaners and provide receipt of the cleaning by the move-out date.');

  subHead('1.10 Vehicles');

  para(`Resident is authorized to park the following vehicle(s) on the property: ${vStr}. Unauthorized vehicles may be removed or towed at the vehicle owner's expense.`);

  para('Owner may enter the Property to inspect it or make alterations or repairs with two (2) days\' notice. If Owner wishes to show the Property to prospective purchasers or Residents, one (1) day\'s notice shall be required. If access is denied after proper notice, the Resident will be fined $100.00 for each violation per RCW 59.18.150.');
