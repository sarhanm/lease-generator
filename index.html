<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lease Agreement Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-mid: #444;
    --ink-light: #777;
    --paper: #faf9f7;
    --paper-mid: #f0ede8;
    --paper-dark: #e5e0d8;
    --accent: #8b3a2a;
    --accent-light: #f5ebe8;
    --border: #d4cfc7;
    --panel-bg: #f7f5f2;
    --preview-bg: #fff;
    --highlight: #fffbe6;
    --sidebar-w: 380px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--ink);
    color: #fff;
    flex-shrink: 0;
    border-bottom: 2px solid var(--accent);
  }
  .topbar-title {
    font-family: 'Crimson Pro', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .topbar-title span { color: #c97b68; }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #723020; }
  .btn-ghost {
    background: transparent;
    color: #ccc;
    border: 1px solid #555;
  }
  .btn-ghost:hover { border-color: #999; color: #fff; }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── FORM PANEL ── */
  .form-panel {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .form-scroll {
    overflow-y: auto;
    flex: 1;
    padding: 20px 20px 40px;
  }
  .form-scroll::-webkit-scrollbar { width: 5px; }
  .form-scroll::-webkit-scrollbar-thumb { background: var(--paper-dark); border-radius: 3px; }

  .form-group {
    margin-bottom: 24px;
  }
  .form-group-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 6px 0 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--ink-mid);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  input, select, textarea {
    width: 100%;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    color: var(--ink);
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--highlight);
  }
  textarea { resize: vertical; min-height: 60px; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field-row label, .field-row input, .field-row select { margin-bottom: 0; }
  .field-row > div { margin-bottom: 10px; }

  /* tenant cards */
  .tenant-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
  }
  .tenant-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .tenant-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .btn-remove {
    background: none;
    border: none;
    color: var(--ink-light);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0 4px;
    transition: color 0.15s;
  }
  .btn-remove:hover { color: var(--accent); }

  .btn-add {
    width: 100%;
    padding: 8px;
    background: var(--accent-light);
    border: 1px dashed #c97b68;
    border-radius: 4px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    font-family: 'Instrument Sans', sans-serif;
    letter-spacing: 0.03em;
  }
  .btn-add:hover { background: #eeddd9; }

  /* pet / vehicle cards */
  .item-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .item-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .item-label {
    font-size: 11px;
    color: var(--ink-light);
    font-weight: 500;
  }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--paper-mid);
  }

  .preview-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    background: var(--paper-dark);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .preview-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    flex: 1;
  }
  .incomplete-count {
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }

  .preview-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
  }
  .preview-scroll::-webkit-scrollbar { width: 6px; }
  .preview-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .preview-doc {
    max-width: 760px;
    margin: 0 auto;
    background: var(--preview-bg);
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    padding: 64px 72px;
    font-family: 'Crimson Pro', serif;
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--ink);
    min-height: 1100px;
  }

  .preview-doc h1 {
    font-size: 26px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    color: var(--ink);
  }
  .preview-doc h2 {
    font-size: 13px;
    font-weight: 400;
    text-align: center;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 24px;
  }
  .doc-meta {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    margin-bottom: 28px;
    font-size: 13px;
    line-height: 1.9;
  }
  .doc-meta strong { color: var(--ink-mid); font-weight: 500; }

  .preview-doc hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .preview-doc h3 {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 28px 0 6px;
    padding-top: 4px;
    border-top: 2px solid var(--accent-light);
  }
  .preview-doc h4 {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-mid);
    margin: 16px 0 4px;
  }
  .preview-doc p {
    margin-bottom: 10px;
    text-align: justify;
  }
  .preview-doc ol, .preview-doc ul {
    margin: 8px 0 10px 22px;
  }
  .preview-doc li { margin-bottom: 4px; }
  .preview-doc blockquote {
    border-left: 3px solid var(--accent);
    padding: 6px 0 6px 16px;
    color: var(--ink-mid);
    margin: 10px 0;
    font-style: italic;
  }

  table.preview-table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0 14px;
    font-size: 13.5px;
  }
  table.preview-table th {
    background: var(--panel-bg);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-mid);
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
  }
  table.preview-table td {
    padding: 7px 12px;
    border: 1px solid var(--border);
    vertical-align: top;
  }
  table.preview-table tr:nth-child(even) td { background: var(--paper); }

  .placeholder {
    background: #fff3cd;
    color: #856404;
    border-radius: 2px;
    padding: 0 3px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  .filled {
    color: var(--accent);
    font-weight: 500;
  }

  .sig-block {
    margin: 16px 0;
    padding: 14px 0;
    border-top: 1px solid var(--border);
  }
  .sig-line {
    display: flex;
    gap: 24px;
    margin-bottom: 10px;
    align-items: flex-end;
  }
  .sig-field {
    flex: 2;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
    min-height: 28px;
    font-size: 13px;
    color: var(--ink-mid);
  }
  .sig-date {
    flex: 1;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
    min-height: 28px;
  }
  .sig-caption {
    font-size: 11px;
    color: var(--ink-light);
    font-family: 'Instrument Sans', sans-serif;
    margin-top: 3px;
  }

  .initials-block {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin: 16px 0;
  }
  .initials-line {
    border-bottom: 1px solid var(--ink);
    width: 80px;
    height: 24px;
  }
  .initials-caption {
    font-size: 12px;
    color: var(--ink-mid);
    font-family: 'Instrument Sans', sans-serif;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Lease <span>Generator</span></div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="clearForm()">Clear Form</button>
    <button class="btn btn-primary" onclick="generatePDF()">⬇ Download PDF</button>
  </div>
</div>

<div class="main">

  <!-- ══ FORM PANEL ══ -->
  <div class="form-panel">
    <div class="form-scroll">

      <!-- PROPERTY & OWNER -->
      <div class="form-group">
        <div class="form-group-title">Property &amp; Owner</div>
        <label>Owner Name</label>
        <input type="text" id="ownerName" value="Mohammad Sarhan" oninput="update()">
        <label>Property Address Line 1</label>
        <input type="text" id="addr1" value="10827 110th Ave NE" oninput="update()">
        <label>Property Address Line 2</label>
        <input type="text" id="addr2" value="Kirkland, WA 98033" oninput="update()">
      </div>

      <!-- LEASE TERM -->
      <div class="form-group">
        <div class="form-group-title">Lease Term</div>
        <div class="field-row">
          <div>
            <label>Start Date</label>
            <input type="date" id="leaseStart" oninput="calcTerm()">
          </div>
          <div>
            <label>End Date</label>
            <input type="date" id="leaseEnd" oninput="calcTerm()">
          </div>
        </div>
        <label>Term (months — auto-calculated)</label>
        <input type="text" id="leaseTerm" placeholder="e.g. 12" oninput="update()" readonly style="background:#f5f5f5;color:#888;">
      </div>

      <!-- FINANCIALS -->
      <div class="form-group">
        <div class="form-group-title">Financials</div>
        <div class="field-row">
          <div>
            <label>Monthly Rent</label>
            <input type="text" id="monthlyRent" placeholder="$0.00" oninput="calcTotal()">
          </div>
          <div>
            <label>Security Deposit</label>
            <input type="text" id="secDeposit" placeholder="$0.00" oninput="update()">
          </div>
        </div>
        <div class="field-row">
          <div>
            <label>Pet Deposit</label>
            <input type="text" id="petDeposit" placeholder="$0.00" oninput="update()">
          </div>
          <div>
            <label>Pet Rent / mo</label>
            <input type="text" id="petRent" placeholder="$0.00" oninput="calcTotal()">
          </div>
        </div>
        <label>Total Monthly (auto-calculated)</label>
        <input type="text" id="totalMonthly" readonly style="background:#f5f5f5;color:#888;" placeholder="$0.00">
        <label>Application Fee (per applicant)</label>
        <input type="text" id="appFee" placeholder="$49.00" oninput="update()">
        <div class="field-row">
          <div>
            <label>Rent Increase Date</label>
            <input type="date" id="rentIncDate" oninput="update()">
          </div>
          <div>
            <label>Rent Increase Amount</label>
            <input type="text" id="rentIncAmt" placeholder="$100" oninput="update()">
          </div>
        </div>
      </div>

      <!-- TENANTS -->
      <div class="form-group">
        <div class="form-group-title">Tenants / Occupants</div>
        <div id="tenantList"></div>
        <button class="btn-add" onclick="addTenant()">+ Add Tenant / Occupant</button>
      </div>

      <!-- PETS -->
      <div class="form-group">
        <div class="form-group-title">Pets</div>
        <div id="petList"></div>
        <button class="btn-add" onclick="addPet()">+ Add Pet</button>
      </div>

      <!-- VEHICLES -->
      <div class="form-group">
        <div class="form-group-title">Authorized Vehicles</div>
        <div id="vehicleList"></div>
        <button class="btn-add" onclick="addVehicle()">+ Add Vehicle</button>
      </div>

    </div>
  </div>

  <!-- ══ PREVIEW PANEL ══ -->
  <div class="preview-panel">
    <div class="preview-toolbar">
      <span class="preview-label">Live Preview</span>
      <span class="incomplete-count" id="incompleteCount"></span>
    </div>
    <div class="preview-scroll">
      <div class="preview-doc" id="previewDoc"></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let tenants = [
  { name: '', role: 'Financially Responsible', phone: '', email: '' }
];
let pets = [];
let vehicles = [];

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
window.onload = () => {
  renderTenantCards();
  renderPetCards();
  renderVehicleCards();
  loadMarkdown();
};

// ═══════════════════════════════════════════════
// TENANT MANAGEMENT
// ═══════════════════════════════════════════════
function addTenant() {
  tenants.push({ name: '', role: 'Other Occupant', phone: '', email: '' });
  renderTenantCards();
  update();
}
function removeTenant(i) {
  if (tenants.length === 1) return;
  tenants.splice(i, 1);
  renderTenantCards();
  update();
}
function renderTenantCards() {
  const el = document.getElementById('tenantList');
  el.innerHTML = tenants.map((t, i) => `
    <div class="tenant-card">
      <div class="tenant-card-header">
        <span class="tenant-num">Tenant ${i + 1}</span>
        ${tenants.length > 1 ? `<button class="btn-remove" onclick="removeTenant(${i})">×</button>` : ''}
      </div>
      <label>Full Name</label>
      <input type="text" value="${esc(t.name)}" placeholder="Full legal name"
        oninput="tenants[${i}].name=this.value;update()">
      <label>Role</label>
      <select onchange="tenants[${i}].role=this.value;update()">
        <option ${t.role==='Financially Responsible'?'selected':''}>Financially Responsible</option>
        <option ${t.role==='Other Occupant'?'selected':''}>Other Occupant</option>
      </select>
      <label>Phone</label>
      <input type="tel" value="${esc(t.phone)}" placeholder="(555) 555-5555"
        oninput="tenants[${i}].phone=this.value;update()">
      <label>Email</label>
      <input type="email" value="${esc(t.email)}" placeholder="email@example.com"
        oninput="tenants[${i}].email=this.value;update()">
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// PET MANAGEMENT
// ═══════════════════════════════════════════════
function addPet() {
  pets.push({ name: '', breed: '', weight: '', age: '' });
  renderPetCards();
  update();
}
function removePet(i) {
  pets.splice(i, 1);
  renderPetCards();
  update();
}
function renderPetCards() {
  const el = document.getElementById('petList');
  if (pets.length === 0) {
    el.innerHTML = '<p style="font-size:12px;color:#999;margin-bottom:8px;">No pets added.</p>';
    return;
  }
  el.innerHTML = pets.map((p, i) => `
    <div class="item-card">
      <div class="item-card-header">
        <span class="item-label">Pet ${i + 1}</span>
        <button class="btn-remove" onclick="removePet(${i})">×</button>
      </div>
      <div class="field-row">
        <div><label>Name</label><input type="text" value="${esc(p.name)}" placeholder="Buddy"
          oninput="pets[${i}].name=this.value;update()"></div>
        <div><label>Breed / Type</label><input type="text" value="${esc(p.breed)}" placeholder="Lab Mix"
          oninput="pets[${i}].breed=this.value;update()"></div>
      </div>
      <div class="field-row">
        <div><label>Weight (lbs)</label><input type="text" value="${esc(p.weight)}" placeholder="45"
          oninput="pets[${i}].weight=this.value;update()"></div>
        <div><label>Age (years)</label><input type="text" value="${esc(p.age)}" placeholder="3"
          oninput="pets[${i}].age=this.value;update()"></div>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// VEHICLE MANAGEMENT
// ═══════════════════════════════════════════════
function addVehicle() {
  vehicles.push({ make: '', model: '', color: '', plate: '', year: '' });
  renderVehicleCards();
  update();
}
function removeVehicle(i) {
  vehicles.splice(i, 1);
  renderVehicleCards();
  update();
}
function renderVehicleCards() {
  const el = document.getElementById('vehicleList');
  if (vehicles.length === 0) {
    el.innerHTML = '<p style="font-size:12px;color:#999;margin-bottom:8px;">No vehicles added.</p>';
    return;
  }
  el.innerHTML = vehicles.map((v, i) => `
    <div class="item-card">
      <div class="item-card-header">
        <span class="item-label">Vehicle ${i + 1}</span>
        <button class="btn-remove" onclick="removeVehicle(${i})">×</button>
      </div>
      <div class="field-row">
        <div><label>Year</label><input type="text" value="${esc(v.year)}" placeholder="2022"
          oninput="vehicles[${i}].year=this.value;update()"></div>
        <div><label>Make</label><input type="text" value="${esc(v.make)}" placeholder="Toyota"
          oninput="vehicles[${i}].make=this.value;update()"></div>
      </div>
      <div class="field-row">
        <div><label>Model</label><input type="text" value="${esc(v.model)}" placeholder="Camry"
          oninput="vehicles[${i}].model=this.value;update()"></div>
        <div><label>Color</label><input type="text" value="${esc(v.color)}" placeholder="Silver"
          oninput="vehicles[${i}].color=this.value;update()"></div>
      </div>
      <label>License Plate</label>
      <input type="text" value="${esc(v.plate)}" placeholder="ABC 1234"
        oninput="vehicles[${i}].plate=this.value;update()">
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// AUTO-CALCULATIONS
// ═══════════════════════════════════════════════
function calcTerm() {
  const s = document.getElementById('leaseStart').value;
  const e = document.getElementById('leaseEnd').value;
  if (s && e) {
    const [sy, sm, sd] = s.split('-').map(Number);
    const [ey, em, ed] = e.split('-').map(Number);
    // Count full months: e.g. Dec 1 → Nov 30 the following year = 12 months
    // We add 1 day to end date to make inclusive-end ranges work correctly
    const endAdj = new Date(ey, em - 1, ed + 1);
    const months = (endAdj.getFullYear() - sy) * 12 + (endAdj.getMonth() - (sm - 1));
    document.getElementById('leaseTerm').value = months > 0 ? months : '';
  }
  update();
}

function calcTotal() {
  const rent = parseDollar(document.getElementById('monthlyRent').value);
  const pet  = parseDollar(document.getElementById('petRent').value);
  const total = rent + pet;
  document.getElementById('totalMonthly').value = total > 0 ? fmt(total) : '';
  update();
}

function parseDollar(s) {
  return parseFloat((s || '').replace(/[$,]/g, '')) || 0;
}
function fmt(n) {
  return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function esc(s) { return (s||'').replace(/"/g,'&quot;'); }
function fmtDate(d) {
  if (!d) return null;
  const [y,m,day] = d.split('-');
  return `${m}/${day}/${y}`;
}

function val(id) { return document.getElementById(id).value.trim(); }

function ph(v, label) {
  if (v) return `<span class="filled">${v}</span>`;
  return `<span class="placeholder">{{${label}}}</span>`;
}

function getTenantNames() {
  const names = tenants.map(t => t.name).filter(Boolean);
  return names.length ? names.join(', ') : null;
}

function getOccupantList() {
  if (!tenants.some(t => t.name)) return null;
  return tenants.filter(t => t.name).map(t => {
    let line = `<strong>${t.name}</strong> — ${t.role}`;
    if (t.phone) line += `<br><small style="color:#777;">${t.phone}</small>`;
    if (t.email) line += `<small style="color:#777;"> · ${t.email}</small>`;
    return `<div style="margin:6px 0 6px 12px;">${line}</div>`;
  }).join('');
}

function getPetList() {
  if (pets.length === 0) return null;
  return pets.map(p => {
    const parts = [p.name, p.breed, p.weight ? p.weight + ' lbs' : '', p.age ? p.age + ' yrs' : ''].filter(Boolean);
    return parts.join(', ');
  }).join('<br>');
}

function getVehicleList() {
  if (vehicles.length === 0) return null;
  return vehicles.map(v => {
    const parts = [v.year, v.make, v.model, v.color, v.plate ? 'Lic# ' + v.plate : ''].filter(Boolean);
    return parts.join(' ');
  }).join('<br>');
}

function getSignatureBlocks() {
  const resp = tenants.filter(t => t.role === 'Financially Responsible' && t.name);
  if (!resp.length) return `<span class="placeholder">{{SIGNATURE_BLOCKS}}</span>`;
  return resp.map(t => `
    <div class="sig-block">
      <div class="sig-line">
        <div>
          <div class="sig-field"></div>
          <div class="sig-caption">Resident Signature — ${t.name}</div>
        </div>
        <div>
          <div class="sig-date"></div>
          <div class="sig-caption">Date</div>
        </div>
      </div>
      <div style="font-size:12px;color:#777;font-family:'Instrument Sans',sans-serif;margin-top:2px;">
        ${t.email ? t.email + ' · ' : ''}${t.phone || ''}
      </div>
    </div>
  `).join('');
}

function initialsBlock() {
  const resp = tenants.filter(t => t.role === 'Financially Responsible' && t.name);
  if (!resp.length) {
    return `<div class="initials-block"><div class="initials-line"></div><div class="initials-caption">Resident Initials &nbsp;&nbsp;&nbsp; Date: __________</div></div>`;
  }
  return resp.map(t => `
    <div class="initials-block">
      <div class="initials-line"></div>
      <div class="initials-caption">${t.name} — Initials &nbsp;&nbsp;&nbsp; Date: __________</div>
    </div>
  `).join('');
}

function countIncomplete() {
  const fields = [
    val('ownerName'), val('addr1'), val('addr2'),
    val('leaseStart'), val('leaseEnd'), val('monthlyRent'), val('secDeposit'), val('appFee')
  ];
  const tenantMissing = tenants.filter(t => !t.name).length;
  const missing = fields.filter(f => !f).length + tenantMissing;
  return missing;
}

let markdownSource = null;

async function loadMarkdown() {
  const loadingEl = document.getElementById('previewDoc');
  loadingEl.innerHTML = '<p style="color:#999;font-family:sans-serif;padding:20px;">Loading contract…</p>';
  try {
    const res = await fetch('lease_agreement.md');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    markdownSource = await res.text();
    update();
  } catch (e) {
    loadingEl.innerHTML = `
      <div style="font-family:sans-serif;padding:24px;color:#8b3a2a;background:#fff5f3;border:1px solid #f0ccc7;border-radius:6px;margin:20px;">
        <strong>Could not load lease_agreement.md</strong><br><br>
        When running locally, browsers block file fetches for security. Use a local server:<br><br>
        <code style="background:#f5f5f5;padding:4px 8px;border-radius:3px;">python3 -m http.server</code><br><br>
        Then open <code style="background:#f5f5f5;padding:4px 8px;border-radius:3px;">http://localhost:8000</code> in your browser.<br><br>
        On GitHub Pages this will work automatically.
      </div>`;
  }
}

// ═══════════════════════════════════════════════
// MAIN UPDATE — render preview from markdown
// ═══════════════════════════════════════════════
function update() {
  if (!markdownSource) return;

  const owner       = val('ownerName');
  const addr1       = val('addr1');
  const addr2       = val('addr2');
  const leaseStart  = fmtDate(val('leaseStart'));
  const leaseEnd    = fmtDate(val('leaseEnd'));
  const leaseTerm   = val('leaseTerm');
  const monthlyRent = val('monthlyRent');
  const secDep      = val('secDeposit');
  const petDep      = val('petDeposit');
  const petRent     = val('petRent');
  const totalMo     = val('totalMonthly');
  const appFee      = val('appFee');
  const rentIncDate = fmtDate(val('rentIncDate'));
  const rentIncAmt  = val('rentIncAmt');
  const tenantNames = getTenantNames();

  // Build occupant list as plain text for markdown
  const occupantListMd = tenants.filter(t => t.name).map(t => {
    let line = `**${t.name}** — ${t.role}`;
    if (t.phone) line += `  \n${t.phone}`;
    if (t.email) line += `  \n${t.email}`;
    return line;
  }).join('\n\n');

  // Build pet list as plain text
  const petListMd = pets.length
    ? pets.map(p => {
        const parts = [p.name, p.breed, p.weight ? p.weight+' lbs' : '', p.age ? p.age+' yrs' : ''].filter(Boolean);
        return `- ${parts.join(', ')}`;
      }).join('\n')
    : '_No pets listed_';

  // Build vehicle list
  const vehicleMd = vehicles.length
    ? vehicles.map(v => {
        const parts = [v.year, v.make, v.model, v.color, v.plate ? 'Lic# '+v.plate : ''].filter(Boolean);
        return `- ${parts.join(' ')}`;
      }).join('\n')
    : '_No vehicles listed_';

  // Build signature blocks
  const sigBlocksMd = tenants
    .filter(t => t.role === 'Financially Responsible' && t.name)
    .map(t => `**RESIDENT:** ${t.name}  \nSignature: __________________________________ Date: __________  \n${t.email ? t.email : ''}${t.phone ? ' · '+t.phone : ''}`)
    .join('\n\n') || 'Signature: __________________________________ Date: __________';

  // Build initials line
  const initialsLineMd = tenants
    .filter(t => t.role === 'Financially Responsible' && t.name)
    .map(t => `*Initials — ${t.name}*: __________ Date: __________`)
    .join('  \n') || '*Initials*: __________ Date: __________';

  const missing = countIncomplete();
  const cntEl = document.getElementById('incompleteCount');
  cntEl.textContent = missing > 0 ? `${missing} field${missing>1?'s':''} incomplete` : '✓ All fields complete';
  cntEl.style.color = missing > 0 ? '#8b3a2a' : '#2a7a3a';

  // Replace all placeholders
  let md = markdownSource;

  const blank = '___________________';

  const replacements = {
    '{{AGREEMENT_DATE}}':       blank,
    '{{OWNER_NAME}}':           owner           || '`OWNER NAME`',
    '{{PROPERTY_ADDRESS_1}}':   addr1           || '`ADDRESS LINE 1`',
    '{{PROPERTY_ADDRESS_2}}':   addr2           || '`ADDRESS LINE 2`',
    '{{TENANT_NAMES}}':         tenantNames     || '`TENANT NAMES`',
    '{{LEASE_START_DATE}}':     leaseStart      || '`START DATE`',
    '{{LEASE_END_DATE}}':       leaseEnd        || '`END DATE`',
    '{{LEASE_TERM_MONTHS}}':    leaseTerm       || '`TERM`',
    '{{MONTHLY_RENT}}':         monthlyRent     || '`MONTHLY RENT`',
    '{{SECURITY_DEPOSIT}}':     secDep          || '`SECURITY DEPOSIT`',
    '{{PET_DEPOSIT}}':          petDep          || '`PET DEPOSIT`',
    '{{PET_RENT}}':             petRent         || '`PET RENT`',
    '{{TOTAL_MONTHLY}}':        totalMo         || '`TOTAL MONTHLY`',
    '{{APPLICATION_FEE}}':      appFee          || '`APPLICATION FEE`',
    '{{RENT_INCREASE_DATE}}':   rentIncDate     || '`RENT INCREASE DATE`',
    '{{RENT_INCREASE_AMOUNT}}': rentIncAmt      || '`RENT INCREASE AMOUNT`',
    '{{TENANT_OCCUPANT_LIST}}': occupantListMd  || '`OCCUPANT LIST`',
    '{{PET_LIST}}':             petListMd,
    '{{AUTHORIZED_VEHICLES}}':  vehicleMd,
    '{{SIGNATURE_BLOCKS}}':     sigBlocksMd,
  };

  for (const [token, value] of Object.entries(replacements)) {
    md = md.split(token).join(value);
  }

  // Append initials lines before each section-end marker
  // Replace the initials placeholder pattern in markdown
  md = md.replace(/Resident Initials: _{10} Date: _{10}/g, initialsLineMd);

  // Render markdown to HTML
  const html = marked.parse(md);

  const docEl = document.getElementById('previewDoc');
  docEl.innerHTML = `
    <h1 style="font-family:'Crimson Pro',serif;font-size:26px;font-weight:600;text-align:center;margin-bottom:4px;">RESIDENTIAL LEASE AGREEMENT</h1>
    <h2 style="font-family:'Instrument Sans',sans-serif;font-size:11px;text-align:center;letter-spacing:0.2em;text-transform:uppercase;color:#777;margin-bottom:28px;">Washington State</h2>
    ${html}
  `;
}

// ═══════════════════════════════════════════════
// PDF GENERATION
// ═══════════════════════════════════════════════
function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });

  const margins = { top: 72, left: 72, right: 72, bottom: 72 };
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const contentW = pageW - margins.left - margins.right;

  // fonts
  const FONT_BODY   = 'times';
  const FONT_SANS   = 'helvetica';
  const SIZE_BODY   = 10;
  const SIZE_H1     = 18;
  const SIZE_H2     = 9;
  const SIZE_H3     = 11;
  const SIZE_H4     = 10;
  const SIZE_SMALL  = 8.5;
  const C_INK       = [26, 26, 26];
  const C_ACCENT    = [139, 58, 42];
  const C_MID       = [80, 80, 80];
  const C_LIGHT     = [140, 140, 140];
  const C_RULE      = [220, 215, 207];
  const C_SHADED    = [247, 245, 242];

  let y = margins.top;
  let pageNum = 1;

  function checkPage(needed = 20) {
    if (y + needed > pageH - margins.bottom) {
      doc.addPage();
      pageNum++;
      y = margins.top;
      // page number footer
      doc.setFont(FONT_SANS, 'normal');
      doc.setFontSize(SIZE_SMALL);
      doc.setTextColor(...C_LIGHT);
      doc.text(`Page ${pageNum}`, pageW / 2, pageH - 36, { align: 'center' });
    }
  }

  function rule(color = C_RULE, weight = 0.5) {
    doc.setDrawColor(...color);
    doc.setLineWidth(weight);
    doc.line(margins.left, y, pageW - margins.right, y);
    y += 8;
  }

  function h1(text) {
    checkPage(40);
    doc.setFont(FONT_BODY, 'bold');
    doc.setFontSize(SIZE_H1);
    doc.setTextColor(...C_INK);
    doc.text(text, pageW / 2, y, { align: 'center' });
    y += 6;
  }

  function subtitle(text) {
    checkPage(20);
    doc.setFont(FONT_SANS, 'normal');
    doc.setFontSize(SIZE_H2);
    doc.setTextColor(...C_LIGHT);
    const spaced = text.split('').join(' ');
    doc.text(spaced.toUpperCase(), pageW / 2, y, { align: 'center' });
    y += 20;
  }

  function sectionHead(text) {
    checkPage(30);
    y += 10;
    doc.setFillColor(...C_ACCENT);
    doc.rect(margins.left, y - 12, contentW, 18, 'F');
    doc.setFont(FONT_SANS, 'bold');
    doc.setFontSize(SIZE_H2);
    doc.setTextColor(255, 255, 255);
    doc.text(text.toUpperCase(), margins.left + 8, y);
    y += 10;
  }

  function subHead(text) {
    checkPage(20);
    y += 8;
    doc.setFont(FONT_SANS, 'bold');
    doc.setFontSize(SIZE_H4);
    doc.setTextColor(...C_ACCENT);
    doc.text(text, margins.left, y);
    y += 4;
    doc.setDrawColor(...C_ACCENT);
    doc.setLineWidth(0.3);
    doc.line(margins.left, y, margins.left + doc.getTextWidth(text), y);
    y += 8;
  }

  function para(text, opts = {}) {
    const indent = opts.indent || 0;
    const x = margins.left + indent;
    const w = contentW - indent;
    doc.setFont(FONT_BODY, opts.bold ? 'bold' : 'normal');
    doc.setFontSize(SIZE_BODY);
    doc.setTextColor(...(opts.color || C_INK));
    const lines = doc.splitTextToSize(text, w);
    lines.forEach(line => {
      checkPage(14);
      doc.text(line, x, y);
      y += 14;
    });
    y += opts.after !== undefined ? opts.after : 4;
  }

  function listItem(text, num, opts = {}) {
    const indent = 18;
    const x = margins.left + indent;
    const w = contentW - indent;
    doc.setFont(FONT_BODY, 'normal');
    doc.setFontSize(SIZE_BODY);
    doc.setTextColor(...C_INK);
    const bullet = opts.bullet || `${num}.`;
    doc.text(bullet, margins.left + 4, y);
    const lines = doc.splitTextToSize(text, w);
    lines.forEach((line, li) => {
      checkPage(14);
      doc.text(line, x, y);
      y += 14;
    });
    y += 2;
  }

  function tableRow(cols, widths, isHeader = false, shaded = false) {
    const rowH = 16;
    checkPage(rowH + 4);
    let x = margins.left;
    if (shaded || isHeader) {
      doc.setFillColor(...(isHeader ? C_ACCENT : C_SHADED));
      doc.rect(x, y - 12, contentW, rowH, 'F');
    }
    doc.setDrawColor(...C_RULE);
    doc.setLineWidth(0.3);
    doc.rect(margins.left, y - 12, contentW, rowH);
    cols.forEach((col, i) => {
      doc.setFont(FONT_SANS, isHeader ? 'bold' : 'normal');
      doc.setFontSize(isHeader ? SIZE_SMALL : SIZE_BODY);
      doc.setTextColor(...(isHeader ? [255,255,255] : C_INK));
      doc.text(String(col || ''), x + 6, y - 1);
      x += widths[i];
      if (i < cols.length - 1) {
        doc.setDrawColor(...C_RULE);
        doc.line(x, y - 12, x, y + 4);
      }
    });
    y += rowH - 2;
  }

  function infoTable(rows) {
    rows.forEach((row, i) => tableRow(row, [180, contentW - 180], false, i % 2 === 0));
    y += 6;
  }

  function sigLine(label, name = '') {
    checkPage(40);
    y += 8;
    doc.setDrawColor(...C_INK);
    doc.setLineWidth(0.4);
    doc.line(margins.left, y, margins.left + 300, y);
    doc.line(margins.left + 320, y, margins.left + contentW, y);
    y += 4;
    doc.setFont(FONT_SANS, 'normal');
    doc.setFontSize(SIZE_SMALL);
    doc.setTextColor(...C_LIGHT);
    doc.text(label + (name ? ` — ${name}` : ''), margins.left, y);
    doc.text('Date', margins.left + 320, y);
    y += 14;
  }

  function initialsLine(name = '') {
    checkPage(30);
    y += 6;
    doc.setFillColor(...C_SHADED);
    doc.roundedRect(margins.left, y - 10, contentW, 22, 2, 2, 'F');
    doc.setDrawColor(...C_RULE);
    doc.setLineWidth(0.3);
    doc.roundedRect(margins.left, y - 10, contentW, 22, 2, 2, 'S');
    doc.setDrawColor(...C_INK);
    doc.setLineWidth(0.4);
    doc.line(margins.left + 10, y + 6, margins.left + 90, y + 6);
    doc.setFont(FONT_SANS, 'normal');
    doc.setFontSize(SIZE_SMALL);
    doc.setTextColor(...C_MID);
    doc.text((name ? name + ' — ' : '') + 'Initials', margins.left + 96, y + 7);
    doc.text('Date: _______________', margins.left + 320, y + 7);
    y += 20;
  }

  // get values
  const owner      = val('ownerName') || '{{OWNER_NAME}}';
  const addr1v     = val('addr1') || '{{ADDRESS_1}}';
  const addr2v     = val('addr2') || '{{ADDRESS_2}}';
  const agDate     = '___________________';
  const lStart     = fmtDate(val('leaseStart')) || '{{START_DATE}}';
  const lEnd       = fmtDate(val('leaseEnd')) || '{{END_DATE}}';
  const lTerm      = val('leaseTerm') || '{{TERM}}';
  const mRent      = val('monthlyRent') || '{{RENT}}';
  const sDep       = val('secDeposit') || '{{SEC_DEP}}';
  const pDep       = val('petDeposit') || '{{PET_DEP}}';
  const pRent      = val('petRent') || '{{PET_RENT}}';
  const totMo      = val('totalMonthly') || '{{TOTAL}}';
  const aFee       = val('appFee') || '{{APP_FEE}}';
  const rIncDate   = fmtDate(val('rentIncDate')) || '{{INC_DATE}}';
  const rIncAmt    = val('rentIncAmt') || '{{INC_AMT}}';
  const tNames     = getTenantNames() || '{{TENANT_NAMES}}';
  const address    = `${addr1v}, ${addr2v}`;

  // page 1 footer
  doc.setFont(FONT_SANS, 'normal');
  doc.setFontSize(SIZE_SMALL);
  doc.setTextColor(...C_LIGHT);
  doc.text('Page 1', pageW / 2, pageH - 36, { align: 'center' });

  // ── TITLE ──
  h1('RESIDENTIAL LEASE AGREEMENT');
  subtitle('Washington State');

  // meta box
  doc.setFillColor(...C_SHADED);
  doc.roundedRect(margins.left, y, contentW, 68, 3, 3, 'F');
  doc.setDrawColor(...C_RULE);
  doc.setLineWidth(0.4);
  doc.roundedRect(margins.left, y, contentW, 68, 3, 3, 'S');
  y += 14;
  const metaX = margins.left + 12;
  const metaPairs = [
    ['Agreement Date', agDate],
    ['Property', address],
    ['Owner', owner],
    ['Resident(s)', tNames],
  ];
  metaPairs.forEach(([k, v]) => {
    doc.setFont(FONT_SANS, 'bold'); doc.setFontSize(SIZE_SMALL); doc.setTextColor(...C_MID);
    doc.text(k + ':', metaX, y);
    doc.setFont(FONT_BODY, 'normal'); doc.setFontSize(SIZE_BODY); doc.setTextColor(...C_INK);
    doc.text(v, metaX + 100, y);
    y += 15;
  });
  y += 8;

  // ── SECTION 1 ──
  sectionHead('Section 1 — Lease Terms');

  subHead('1.1 Overview');
  para(`This Initial Agreement is made on ${agDate} between Owner ${owner} (hereinafter called "Owner") and ${tNames} (hereinafter called "Resident"), for rental Premises located at: ${address} (hereinafter called the "Premises.")`);

  subHead('1.2 Term');
  para(`The term of this Agreement shall be a Lease for a term of ${lTerm} months beginning ${lStart} and ending ${lEnd}.`);
  para('Upon expiration of this term, all Resident\'s rights to occupy the Premises shall cease without right to extend the term hereof. This Agreement shall not revert to a month-to-month tenancy following expiration of the term.');
  para('Holdover Fee — In the event that the Resident remains in possession of the rental property beyond the initial term of the lease without executing a new lease or obtaining the Owner\'s consent, the Resident shall be held liable for an unauthorized month-to-month fee equivalent to 10% of the monthly rent. This fee is in addition to the rent amount outlined in the lease agreement.');

  subHead('1.3 Rent');
  tableRow(['Description', 'Amount'], [contentW * 0.7, contentW * 0.3], true);
  [['Monthly Rent', mRent], ['Pet Rent', pRent], ['Total Monthly Due', totMo]].forEach(([d,a],i) => tableRow([d,a],[contentW*0.7,contentW*0.3],false,i%2===0));
  y += 6;
  para('Prorated Rent, if any, shall apply to the second month of tenancy and shall be payable on the first day of the second month of tenancy.');
  para('The total amount of monthly rent due is considered "Rent" and is payable in advance by the first day of each and every month to Owner, or any such other place that the Owner may from time to time designate.');
  para('Late Charge: Rent received more than five (5) days after the Rent Due Date shall result in a $50.00 late payment charge plus $20.00 each additional day thereafter that rent has not been paid in full.');
  para('Returned Payment: Any payment which fails to clear the bank shall be treated as unpaid rent and shall be subject to the aforementioned late payment charge, plus a $45.00 returned payment fee.');
  para('Notice Fees: If Owner shall give a statutory Notice to Pay or Vacate pursuant to RCW 59.12 et seq. or RCW 59.18 et seq., Resident agrees to pay $250.00 for preparing and giving the notice.');

  subHead('1.4 Deposit');
  para(`The Resident shall pay a Security Deposit in the total amount of ${sDep}, due in full prior to or on the lease commencement date. The deposit is for all purposes, including unpaid rent, damage, cleaning, late payment, utilities, keys, and other charges. The Resident's liability is not limited by the amount of the deposit.`);
  para('Labor and administrative costs for cleaning and repairing the Premises shall be at the rate of $65.00 per hour. Resident agrees to hire professional cleaners and provide receipt of the cleaning by the move-out date.');

  subHead('1.7 Applications and Screening Fees');
  para(`Application and/or screening fees in the amount of ${aFee} per applicant are non-refundable. Resident warrants the accuracy of all information contained on the Resident's rental application.`);

  subHead('1.8 Termination of Tenancies');
  para('Resident understands and agrees that this tenancy shall terminate at 4:00 PM on the last day of occupancy. It is Resident\'s obligation to have the Premises vacant and thoroughly clean by that hour.');

  subHead('1.9 Utility Charges');
  para('Paid for by Resident directly to utility provider: All utilities including Electricity, Garbage, Sewer, Water, Natural Gas/Oil, Landscaping, and Internet.');
  para('Utilities included in Rent: None. Non-payment of utility charges may lead to an eviction proceeding. Utilities are considered as "Rent."');

  subHead('1.10 Vehicles');
  const vStr = getVehicleList() ? getVehicleList().replace(/<br>/g, '; ') : '{{AUTHORIZED_VEHICLES}}';
  para(`Resident is authorized to park the following vehicle(s) on the property: ${vStr}. Unauthorized vehicles may be removed or towed at the vehicle owner's expense.`);

  subHead('1.11 Inspection / Re-Lease / Sale');
  para('Owner may enter the Property to inspect it or make alterations or repairs with two (2) days\' notice. If Owner wishes to show the Property to prospective purchasers or Residents, one (1) day\'s notice shall be required. If access is denied after proper notice, the Resident will be fined $100.00 for each violation per RCW 59.18.150.');

  subHead('1.12 Early Move-Out');
  para('If Resident vacates the Premises prior to the expiration hereof or without notice as required in this lease, Resident shall be liable for additional rent as provided for in RCW 59.18.310. If for any reason during the term of the lease, you need to break the lease, you will be liable for any expenses until a replacement resident is located and placed. In addition to the payment of rent, you will also be responsible for payment of a one-month rent Re-letting fee, this is a stipulated damages clause for the expense of advertising and office time for finding a new resident, and the payment of all utilities until the new resident is moved in.');

  subHead('1.14 Lockout Clause / Keys; Locks');
  para('The Resident will be responsible for any costs associated with lost or stolen keys or access cards and remotes. The Resident may not re-key or remove any locks. Owner does not provide locksmith services.');

  subHead('1.15 Asbestos');
  para('The Premises may contain asbestos and/or other substances known to cause cancer and/or birth defects. Resident must not take any action which damages or disturbs the ceiling, including piercing, hanging objects, attaching fixtures, painting, or replacing light fixtures. Resident must notify Owner immediately in writing of any damage to or deterioration of the ceiling.');

  subHead('1.17 Smoke Detection Devices / Fire Safety');
  para('It is the responsibility of Resident to maintain all smoke detection devices, including replacement of any batteries. Failure to comply may result in a fine of up to $200.00. Resident agrees to test the smoke detector monthly and report any malfunctions in writing.');

  subHead('1.18 Carbon Monoxide Detection Devices');
