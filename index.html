<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lease Agreement Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-mid: #444;
    --ink-light: #777;
    --paper: #faf9f7;
    --paper-mid: #f0ede8;
    --paper-dark: #e5e0d8;
    --accent: #8b3a2a;
    --accent-light: #f5ebe8;
    --border: #d4cfc7;
    --panel-bg: #f7f5f2;
    --preview-bg: #fff;
    --highlight: #fffbe6;
    --sidebar-w: 380px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--ink);
    color: #fff;
    flex-shrink: 0;
    border-bottom: 2px solid var(--accent);
  }
  .topbar-title {
    font-family: 'Crimson Pro', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .topbar-title span { color: #c97b68; }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #723020; }
  .btn-ghost {
    background: transparent;
    color: #ccc;
    border: 1px solid #555;
  }
  .btn-ghost:hover { border-color: #999; color: #fff; }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── FORM PANEL ── */
  .form-panel {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .form-scroll {
    overflow-y: auto;
    flex: 1;
    padding: 20px 20px 40px;
  }
  .form-scroll::-webkit-scrollbar { width: 5px; }
  .form-scroll::-webkit-scrollbar-thumb { background: var(--paper-dark); border-radius: 3px; }

  .form-group {
    margin-bottom: 24px;
  }
  .form-group-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 6px 0 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--ink-mid);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  input, select, textarea {
    width: 100%;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    color: var(--ink);
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--highlight);
  }
  textarea { resize: vertical; min-height: 60px; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field-row label, .field-row input, .field-row select { margin-bottom: 0; }
  .field-row > div { margin-bottom: 10px; }

  /* tenant cards */
  .tenant-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
  }
  .tenant-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .tenant-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .btn-remove {
    background: none;
    border: none;
    color: var(--ink-light);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0 4px;
    transition: color 0.15s;
  }
  .btn-remove:hover { color: var(--accent); }

  .btn-add {
    width: 100%;
    padding: 8px;
    background: var(--accent-light);
    border: 1px dashed #c97b68;
    border-radius: 4px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    font-family: 'Instrument Sans', sans-serif;
    letter-spacing: 0.03em;
  }
  .btn-add:hover { background: #eeddd9; }

  /* pet / vehicle cards */
  .item-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .item-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .item-label {
    font-size: 11px;
    color: var(--ink-light);
    font-weight: 500;
  }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--paper-mid);
  }

  .preview-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    background: var(--paper-dark);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .preview-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    flex: 1;
  }
  .incomplete-count {
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }

  .preview-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
  }
  .preview-scroll::-webkit-scrollbar { width: 6px; }
  .preview-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .preview-doc {
    max-width: 760px;
    margin: 0 auto;
    background: var(--preview-bg);
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    padding: 64px 72px;
    font-family: 'Crimson Pro', serif;
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--ink);
    min-height: 1100px;
  }

  .preview-doc h1 {
    font-size: 26px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    color: var(--ink);
  }
  .preview-doc h2 {
    font-size: 13px;
    font-weight: 400;
    text-align: center;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 24px;
  }
  .doc-meta {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    margin-bottom: 28px;
    font-size: 13px;
    line-height: 1.9;
  }
  .doc-meta strong { color: var(--ink-mid); font-weight: 500; }

  .preview-doc hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .preview-doc h3 {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 28px 0 6px;
    padding-top: 4px;
    border-top: 2px solid var(--accent-light);
  }
  .preview-doc h4 {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-mid);
    margin: 16px 0 4px;
  }
  .preview-doc p {
    margin-bottom: 10px;
    text-align: justify;
  }
  .preview-doc ol, .preview-doc ul {
    margin: 8px 0 10px 22px;
  }
  .preview-doc li { margin-bottom: 4px; }
  .preview-doc blockquote {
    border-left: 3px solid var(--accent);
    padding: 6px 0 6px 16px;
    color: var(--ink-mid);
    margin: 10px 0;
    font-style: italic;
  }

  table.preview-table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0 14px;
    font-size: 13.5px;
  }
  table.preview-table th {
    background: var(--panel-bg);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-mid);
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
  }
  table.preview-table td {
    padding: 7px 12px;
    border: 1px solid var(--border);
    vertical-align: top;
  }
  table.preview-table tr:nth-child(even) td { background: var(--paper); }

  .placeholder {
    background: #fff3cd;
    color: #856404;
    border-radius: 2px;
    padding: 0 3px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  .filled {
    color: var(--accent);
    font-weight: 500;
  }

  .sig-block {
    margin: 16px 0;
    padding: 14px 0;
    border-top: 1px solid var(--border);
  }
  .sig-line {
    display: flex;
    gap: 24px;
    margin-bottom: 10px;
    align-items: flex-end;
  }
  .sig-field {
    flex: 2;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
    min-height: 28px;
    font-size: 13px;
    color: var(--ink-mid);
  }
  .sig-date {
    flex: 1;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
    min-height: 28px;
  }
  .sig-caption {
    font-size: 11px;
    color: var(--ink-light);
    font-family: 'Instrument Sans', sans-serif;
    margin-top: 3px;
  }

  .initials-block {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin: 16px 0;
  }
  .initials-line {
    border-bottom: 1px solid var(--ink);
    width: 80px;
    height: 24px;
  }
  .initials-caption {
    font-size: 12px;
    color: var(--ink-mid);
    font-family: 'Instrument Sans', sans-serif;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Lease <span>Generator</span></div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="clearForm()">Clear Form</button>
    <button class="btn btn-primary" onclick="generatePDF()">🖨 Print / Save PDF</button>
  </div>
</div>

<div class="main">

  <!-- ══ FORM PANEL ══ -->
  <div class="form-panel">
    <div class="form-scroll">

      <!-- PROPERTY & OWNER -->
      <div class="form-group">
        <div class="form-group-title">Property &amp; Owner</div>
        <label>Owner Name</label>
        <input type="text" id="ownerName" placeholder="Full legal name" oninput="update()">
        <label>Property Address Line 1</label>
        <input type="text" id="addr1" placeholder="Street address" oninput="update()">
        <label>Property Address Line 2</label>
        <input type="text" id="addr2" placeholder="City, State ZIP" oninput="update()">
      </div>

      <!-- LEASE TERM -->
      <div class="form-group">
        <div class="form-group-title">Lease Term</div>
        <div class="field-row">
          <div>
            <label>Start Date</label>
            <input type="date" id="leaseStart" oninput="calcTerm()">
          </div>
          <div>
            <label>End Date</label>
            <input type="date" id="leaseEnd" oninput="calcTerm()">
          </div>
        </div>
        <label>Term (months — auto-calculated)</label>
        <input type="text" id="leaseTerm" placeholder="e.g. 12" oninput="update()" readonly style="background:#f5f5f5;color:#888;">
      </div>

      <!-- FINANCIALS -->
      <div class="form-group">
        <div class="form-group-title">Financials</div>
        <div class="field-row">
          <div>
            <label>Monthly Rent</label>
            <input type="text" id="monthlyRent" placeholder="$0.00" oninput="calcTotal()">
          </div>
          <div>
            <label>Security Deposit</label>
            <input type="text" id="secDeposit" placeholder="$0.00" oninput="update()">
          </div>
        </div>
        <div class="field-row">
          <div>
            <label>Pet Deposit</label>
            <input type="text" id="petDeposit" placeholder="$0.00" oninput="update()">
          </div>
          <div>
            <label>Pet Rent / mo</label>
            <input type="text" id="petRent" placeholder="$0.00" oninput="calcTotal()">
          </div>
        </div>
        <label>Total Monthly (auto-calculated)</label>
        <input type="text" id="totalMonthly" readonly style="background:#f5f5f5;color:#888;" placeholder="$0.00">
        <label>Application Fee (per applicant)</label>
        <input type="text" id="appFee" placeholder="$49.00" oninput="update()">
        <div class="field-row">
          <div>
            <label>Rent Increase Date</label>
            <input type="date" id="rentIncDate" oninput="update()">
          </div>
          <div>
            <label>Rent Increase Amount</label>
            <input type="text" id="rentIncAmt" placeholder="$100" oninput="update()">
          </div>
        </div>
        <label>Last Month Prepayment</label>
        <input type="text" id="lastMonthPrepay" placeholder="$0.00 or N/A" oninput="update()">
        <label>Non-Refundable Fee Purpose</label>
        <input type="text" id="nonRefundPurpose" placeholder="e.g. Cleaning fee, or N/A" oninput="update()">
        <label>Non-Refundable Fee Amount</label>
        <input type="text" id="nonRefundAmount" placeholder="$0.00 or N/A" oninput="update()">
      </div>

      <!-- TENANTS -->
      <div class="form-group">
        <div class="form-group-title">Tenants / Occupants</div>
        <div id="tenantList"></div>
        <button class="btn-add" onclick="addTenant()">+ Add Tenant / Occupant</button>
      </div>

      <!-- PETS -->
      <div class="form-group">
        <div class="form-group-title">Pets</div>
        <div id="petList"></div>
        <button class="btn-add" onclick="addPet()">+ Add Pet</button>
      </div>

      <!-- VEHICLES -->
      <div class="form-group">
        <div class="form-group-title">Authorized Vehicles</div>
        <div id="vehicleList"></div>
        <button class="btn-add" onclick="addVehicle()">+ Add Vehicle</button>
      </div>

    </div>
  </div>

  <!-- ══ PREVIEW PANEL ══ -->
  <div class="preview-panel">
    <div class="preview-toolbar">
      <span class="preview-label">Live Preview</span>
      <span class="incomplete-count" id="incompleteCount"></span>
    </div>
    <div class="preview-scroll">
      <div class="preview-doc" id="previewDoc"></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let tenants = [
  { name: '', role: 'Financially Responsible', phone: '', email: '' }
];
let pets = [];
let vehicles = [];

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
window.onload = () => {
  renderTenantCards();
  renderPetCards();
  renderVehicleCards();
  loadMarkdown();
};

// ═══════════════════════════════════════════════
// TENANT MANAGEMENT
// ═══════════════════════════════════════════════
function addTenant() {
  tenants.push({ name: '', role: 'Financially Responsible', phone: '', email: '' });
  renderTenantCards();
  update();
}
function removeTenant(i) {
  if (tenants.length === 1) return;
  tenants.splice(i, 1);
  renderTenantCards();
  update();
}
function renderTenantCards() {
  const el = document.getElementById('tenantList');
  el.innerHTML = tenants.map((t, i) => `
    <div class="tenant-card">
      <div class="tenant-card-header">
        <span class="tenant-num">Tenant ${i + 1}</span>
        ${tenants.length > 1 ? `<button class="btn-remove" onclick="removeTenant(${i})">×</button>` : ''}
      </div>
      <label>Full Name</label>
      <input type="text" value="${esc(t.name)}" placeholder="Full legal name"
        oninput="tenants[${i}].name=this.value;update()">
      <label>Role</label>
      <select onchange="tenants[${i}].role=this.value;renderTenantCards();update()">
        <option ${t.role==='Financially Responsible'?'selected':''}>Financially Responsible</option>
        <option ${t.role==='Minor'?'selected':''}>Minor</option>
      </select>
      ${t.role !== 'Minor' ? `
      <label>Phone</label>
      <input type="tel" value="${esc(t.phone)}" placeholder="(555) 555-5555"
        oninput="tenants[${i}].phone=this.value;update()">
      <label>Email</label>
      <input type="email" value="${esc(t.email)}" placeholder="email@example.com"
        oninput="tenants[${i}].email=this.value;update()">
      ` : `<p style="font-size:11px;color:#999;margin:4px 0 6px;">Minor — no contact info or signature required.</p>`}
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// PET MANAGEMENT
// ═══════════════════════════════════════════════
function addPet() {
  pets.push({ name: '', breed: '', weight: '', age: '' });
  renderPetCards();
  update();
}
function removePet(i) {
  pets.splice(i, 1);
  renderPetCards();
  update();
}
function renderPetCards() {
  const el = document.getElementById('petList');
  if (pets.length === 0) {
    el.innerHTML = '<p style="font-size:12px;color:#999;margin-bottom:8px;">No pets added.</p>';
    return;
  }
  el.innerHTML = pets.map((p, i) => `
    <div class="item-card">
      <div class="item-card-header">
        <span class="item-label">Pet ${i + 1}</span>
        <button class="btn-remove" onclick="removePet(${i})">×</button>
      </div>
      <div class="field-row">
        <div><label>Name</label><input type="text" value="${esc(p.name)}" placeholder="Buddy"
          oninput="pets[${i}].name=this.value;update()"></div>
        <div><label>Breed / Type</label><input type="text" value="${esc(p.breed)}" placeholder="Lab Mix"
          oninput="pets[${i}].breed=this.value;update()"></div>
      </div>
      <div class="field-row">
        <div><label>Weight (lbs)</label><input type="text" value="${esc(p.weight)}" placeholder="45"
          oninput="pets[${i}].weight=this.value;update()"></div>
        <div><label>Age (years)</label><input type="text" value="${esc(p.age)}" placeholder="3"
          oninput="pets[${i}].age=this.value;update()"></div>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// VEHICLE MANAGEMENT
// ═══════════════════════════════════════════════
function addVehicle() {
  vehicles.push({ make: '', model: '', color: '', plate: '', year: '' });
  renderVehicleCards();
  update();
}
function removeVehicle(i) {
  vehicles.splice(i, 1);
  renderVehicleCards();
  update();
}
function renderVehicleCards() {
  const el = document.getElementById('vehicleList');
  if (vehicles.length === 0) {
    el.innerHTML = '<p style="font-size:12px;color:#999;margin-bottom:8px;">No vehicles added.</p>';
    return;
  }
  el.innerHTML = vehicles.map((v, i) => `
    <div class="item-card">
      <div class="item-card-header">
        <span class="item-label">Vehicle ${i + 1}</span>
        <button class="btn-remove" onclick="removeVehicle(${i})">×</button>
      </div>
      <div class="field-row">
        <div><label>Year</label><input type="text" value="${esc(v.year)}" placeholder="2022"
          oninput="vehicles[${i}].year=this.value;update()"></div>
        <div><label>Make</label><input type="text" value="${esc(v.make)}" placeholder="Toyota"
          oninput="vehicles[${i}].make=this.value;update()"></div>
      </div>
      <div class="field-row">
        <div><label>Model</label><input type="text" value="${esc(v.model)}" placeholder="Camry"
          oninput="vehicles[${i}].model=this.value;update()"></div>
        <div><label>Color</label><input type="text" value="${esc(v.color)}" placeholder="Silver"
          oninput="vehicles[${i}].color=this.value;update()"></div>
      </div>
      <label>License Plate</label>
      <input type="text" value="${esc(v.plate)}" placeholder="ABC 1234"
        oninput="vehicles[${i}].plate=this.value;update()">
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// AUTO-CALCULATIONS
// ═══════════════════════════════════════════════
function calcTerm() {
  const s = document.getElementById('leaseStart').value;
  const e = document.getElementById('leaseEnd').value;
  if (s && e) {
    const [sy, sm, sd] = s.split('-').map(Number);
    const [ey, em, ed] = e.split('-').map(Number);
    // Count full months: e.g. Dec 1 → Nov 30 the following year = 12 months
    // We add 1 day to end date to make inclusive-end ranges work correctly
    const endAdj = new Date(ey, em - 1, ed + 1);
    const months = (endAdj.getFullYear() - sy) * 12 + (endAdj.getMonth() - (sm - 1));
    document.getElementById('leaseTerm').value = months > 0 ? months : '';
  }
  update();
}

function calcTotal() {
  const rent = parseDollar(document.getElementById('monthlyRent').value);
  const pet  = parseDollar(document.getElementById('petRent').value);
  const total = rent + pet;
  document.getElementById('totalMonthly').value = total > 0 ? fmt(total) : '';
  update();
}

function parseDollar(s) {
  return parseFloat((s || '').replace(/[$,]/g, '')) || 0;
}
function fmt(n) {
  return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function esc(s) { return (s||'').replace(/"/g,'&quot;'); }
function fmtDate(d) {
  if (!d) return null;
  const [y,m,day] = d.split('-');
  return `${m}/${day}/${y}`;
}

function val(id) { return document.getElementById(id).value.trim(); }

function ph(v, label) {
  if (v) return `<span class="filled">${v}</span>`;
  return `<span class="placeholder">{{${label}}}</span>`;
}

function getTenantNames() {
  const names = tenants.map(t => t.name).filter(Boolean);
  return names.length ? names.join(', ') : null;
}

function getOccupantList() {
  if (!tenants.some(t => t.name)) return null;
  return tenants.filter(t => t.name).map(t => {
    let line = `<strong>${t.name}</strong> — ${t.role}`;
    if (t.phone) line += `<br><small style="color:#777;">${t.phone}</small>`;
    if (t.email) line += `<small style="color:#777;"> · ${t.email}</small>`;
    return `<div style="margin:6px 0 6px 12px;">${line}</div>`;
  }).join('');
}

function getPetList() {
  if (pets.length === 0) return null;
  return pets.map(p => {
    const parts = [p.name, p.breed, p.weight ? p.weight + ' lbs' : '', p.age ? p.age + ' yrs' : ''].filter(Boolean);
    return parts.join(', ');
  }).join('<br>');
}

function getVehicleList() {
  if (vehicles.length === 0) return null;
  return vehicles.map(v => {
    const parts = [v.year, v.make, v.model, v.color, v.plate ? 'Lic# ' + v.plate : ''].filter(Boolean);
    return parts.join(' ');
  }).join('<br>');
}

function getSignatureBlocks() {
  const resp = tenants.filter(t => t.role !== 'Minor' && t.name);
  if (!resp.length) return `<span class="placeholder">{{SIGNATURE_BLOCKS}}</span>`;
  return resp.map(t => `
    <div class="sig-block">
      <div class="sig-line">
        <div>
          <div class="sig-field"></div>
          <div class="sig-caption">Resident Signature — ${t.name}</div>
        </div>
        <div>
          <div class="sig-date"></div>
          <div class="sig-caption">Date</div>
        </div>
      </div>
      <div style="font-size:12px;color:#777;font-family:'Instrument Sans',sans-serif;margin-top:2px;">
        ${t.email ? t.email + ' · ' : ''}${t.phone || ''}
      </div>
    </div>
  `).join('');
}

function initialsBlock() {
  const resp = tenants.filter(t => t.role !== 'Minor' && t.name);
  if (!resp.length) {
    return `<div class="initials-block"><div class="initials-line"></div><div class="initials-caption">Resident Initials &nbsp;&nbsp;&nbsp; Date: __________</div></div>`;
  }
  return resp.map(t => `
    <div class="initials-block">
      <div class="initials-line"></div>
      <div class="initials-caption">${t.name} — Initials &nbsp;&nbsp;&nbsp; Date: __________</div>
    </div>
  `).join('');
}

function countIncomplete() {
  const fields = [
    val('ownerName'), val('addr1'), val('addr2'),
    val('leaseStart'), val('leaseEnd'), val('monthlyRent'), val('secDeposit'), val('appFee')
  ];
  const tenantMissing = tenants.filter(t => !t.name).length;
  const missing = fields.filter(f => !f).length + tenantMissing;
  return missing;
}

// ═══════════════════════════════════════════════
// MARKDOWN SOURCE
// ═══════════════════════════════════════════════
let markdownSource = null;

async function loadMarkdown() {
  const loadingEl = document.getElementById('previewDoc');
  loadingEl.innerHTML = '<p style="color:#999;font-family:sans-serif;padding:20px;">Loading contract…</p>';
  try {
    const res = await fetch('lease_agreement.md');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    markdownSource = await res.text();
    update();
  } catch (e) {
    loadingEl.innerHTML = `
      <div style="font-family:sans-serif;padding:24px;color:#8b3a2a;background:#fff5f3;border:1px solid #f0ccc7;border-radius:6px;margin:20px;">
        <strong>Could not load lease_agreement.md</strong><br><br>
        When running locally, browsers block file fetches for security. Use a local server:<br><br>
        <code style="background:#f5f5f5;padding:4px 8px;border-radius:3px;">python3 -m http.server</code><br><br>
        Then open <code style="background:#f5f5f5;padding:4px 8px;border-radius:3px;">http://localhost:8000</code> in your browser.<br><br>
        On GitHub Pages this will work automatically.
      </div>`;
  }
}

// ═══════════════════════════════════════════════
// MAIN UPDATE — render preview from markdown
// ═══════════════════════════════════════════════
function update() {
  if (!markdownSource) return;

  const owner       = val('ownerName');
  const addr1       = val('addr1');
  const addr2       = val('addr2');
  const leaseStart  = fmtDate(val('leaseStart'));
  const leaseEnd    = fmtDate(val('leaseEnd'));
  const leaseTerm   = val('leaseTerm');
  const monthlyRent = val('monthlyRent');
  const secDep      = val('secDeposit');
  const petDep      = val('petDeposit');
  const petRent     = val('petRent');
  const totalMo     = val('totalMonthly');
  const appFee      = val('appFee');
  const rentIncDate = fmtDate(val('rentIncDate'));
  const rentIncAmt  = val('rentIncAmt');
  const lastMonthPrepay  = val('lastMonthPrepay');
  const nonRefundPurpose = val('nonRefundPurpose');
  const nonRefundAmount  = val('nonRefundAmount');
  const tenantNames = getTenantNames();

  // Build occupant list as plain text for markdown
  const occupantListMd = tenants.filter(t => t.name).map(t => {
    if (t.role === 'Minor') {
      return `**${t.name}** — Minor (not a signatory)`;
    }
    let line = `**${t.name}** — Financially Responsible`;
    if (t.phone) line += `  \n${t.phone}`;
    if (t.email) line += `  \n${t.email}`;
    return line;
  }).join('\n\n');

  // Build pet list as plain text
  const petListMd = pets.length
    ? pets.map(p => {
        const parts = [p.name, p.breed, p.weight ? p.weight+' lbs' : '', p.age ? p.age+' yrs' : ''].filter(Boolean);
        return `- ${parts.join(', ')}`;
      }).join('\n')
    : '_No pets listed_';

  // Build vehicle list
  const vehicleMd = vehicles.length
    ? vehicles.map(v => {
        const parts = [v.year, v.make, v.model, v.color, v.plate ? 'Lic# '+v.plate : ''].filter(Boolean);
        return `- ${parts.join(' ')}`;
      }).join('\n')
    : '_No vehicles listed_';

  // Build signature blocks
  const sigBlocksMd = tenants
    .filter(t => t.role !== 'Minor' && t.name)
    .map(t => `**RESIDENT:**\n\nSignature: __________________________________ Date: __________\n\nPrinted Name: ${t.name}\n\n${t.email ? t.email : ''}${t.phone ? ' · '+t.phone : ''}`)
    .join('\n\n---\n\n') || 'Signature: __________________________________ Date: __________\n\nPrinted Name: __________________________________';

  // Build initials line
  const initialsLineMd = tenants
    .filter(t => t.role !== 'Minor' && t.name)
    .map(t => `*Initials — ${t.name}*: __________ Date: __________`)
    .join('  \n') || '*Initials*: __________ Date: __________';

  const missing = countIncomplete();
  const cntEl = document.getElementById('incompleteCount');
  cntEl.textContent = missing > 0 ? `${missing} field${missing>1?'s':''} incomplete` : '✓ All fields complete';
  cntEl.style.color = missing > 0 ? '#8b3a2a' : '#2a7a3a';

  // Replace all placeholders
  let md = markdownSource;

  const blank = '___________________';

  const replacements = {
    '{{AGREEMENT_DATE}}':       blank,
    '{{OWNER_NAME}}':           owner           || '`OWNER NAME`',
    '{{PROPERTY_ADDRESS_1}}':   addr1           || '`ADDRESS LINE 1`',
    '{{PROPERTY_ADDRESS_2}}':   addr2           || '`ADDRESS LINE 2`',
    '{{TENANT_NAMES}}':         tenantNames     || '`TENANT NAMES`',
    '{{LEASE_START_DATE}}':     leaseStart      || '`START DATE`',
    '{{LEASE_END_DATE}}':       leaseEnd        || '`END DATE`',
    '{{LEASE_TERM_MONTHS}}':    leaseTerm       || '`TERM`',
    '{{MONTHLY_RENT}}':         monthlyRent     || '`MONTHLY RENT`',
    '{{SECURITY_DEPOSIT}}':     secDep          || '`SECURITY DEPOSIT`',
    '{{PET_DEPOSIT}}':          petDep          || '`PET DEPOSIT`',
    '{{PET_RENT}}':             petRent         || '`PET RENT`',
    '{{TOTAL_MONTHLY}}':        totalMo         || '`TOTAL MONTHLY`',
    '{{APPLICATION_FEE}}':      appFee          || '`APPLICATION FEE`',
    '{{RENT_INCREASE_DATE}}':   rentIncDate     || '`RENT INCREASE DATE`',
    '{{RENT_INCREASE_AMOUNT}}': rentIncAmt      || '`RENT INCREASE AMOUNT`',
    '{{LAST_MONTH_PREPAYMENT}}':    lastMonthPrepay  || '`LAST MONTH PREPAYMENT`',
    '{{NON_REFUNDABLE_FEE_PURPOSE}}': nonRefundPurpose || '`NON-REFUNDABLE FEE PURPOSE`',
    '{{NON_REFUNDABLE_FEE_AMOUNT}}':  nonRefundAmount  || '`NON-REFUNDABLE FEE AMOUNT`',
    '{{TENANT_OCCUPANT_LIST}}': occupantListMd  || '`OCCUPANT LIST`',
    '{{PET_LIST}}':             petListMd,
    '{{AUTHORIZED_VEHICLES}}':  vehicleMd,
    '{{SIGNATURE_BLOCKS}}':     sigBlocksMd,
  };

  for (const [token, value] of Object.entries(replacements)) {
    md = md.split(token).join(value);
  }

  // Append initials lines before each section-end marker
  // Replace the initials placeholder pattern in markdown
  md = md.replace(/Resident Initials: _{10} Date: _{10}/g, initialsLineMd);

  // Render markdown to HTML
  const html = marked.parse(md);

  const docEl = document.getElementById('previewDoc');
  docEl.innerHTML = `
    <h1 style="font-family:'Crimson Pro',serif;font-size:26px;font-weight:600;text-align:center;margin-bottom:4px;">RESIDENTIAL LEASE AGREEMENT</h1>
    <h2 style="font-family:'Instrument Sans',sans-serif;font-size:11px;text-align:center;letter-spacing:0.2em;text-transform:uppercase;color:#777;margin-bottom:28px;">Washington State</h2>
    ${html}
  `;
}

function clearForm() {
  if (!confirm('Clear all form data?')) return;
  document.querySelectorAll('input, select, textarea').forEach(el => {
    if (el.type === 'select-one') el.selectedIndex = 0;
    else el.value = '';
  });

  document.getElementById('addr1').value = '';
  document.getElementById('addr2').value = '';
  document.getElementById('lastMonthPrepay').value = '';
  document.getElementById('nonRefundPurpose').value = '';
  document.getElementById('nonRefundAmount').value = '';
  tenants = [{ name: '', role: 'Financially Responsible', phone: '', email: '' }];
  pets = [];
  vehicles = [];
  renderTenantCards();
  renderPetCards();
  renderVehicleCards();
